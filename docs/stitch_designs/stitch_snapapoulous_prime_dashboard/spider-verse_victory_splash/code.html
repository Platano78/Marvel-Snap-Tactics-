<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Spider-Verse Victory Splash</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Permanent+Marker&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2f20d",
                        "background-light": "#f8f8f5",
                        "background-dark": "#181811",
                        "spider-pink": "#ff00ff",
                        "spider-cyan": "#00ffff",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "marker": ["Permanent Marker", "cursive"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .halftone-bg {
            background-color: #181811;
            background-image: radial-gradient(#ff00ff 10%, transparent 11%), radial-gradient(#f2f20d 10%, transparent 11%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.15;
        }
        
        .chromatic-glitch {
            text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff;
        }

        .kirby-krackle {
            background-image: radial-gradient(circle, #000 30%, transparent 70%);
            background-size: 15px 15px;
        }

        .starburst {
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        .spray-drip::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 20%;
            width: 4px;
            height: 40px;
            background: #f2f20d;
            border-radius: 2px;
            box-shadow: 40px 10px 0 #f2f20d, 80px -5px 0 #f2f20d;
        }

        .thought-bubble-sketch {
            box-shadow: 8px 8px 0px 0px #000;
            border: 3px solid #000;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-white selection:bg-primary/30">
<!-- Main Container -->
<div class="relative min-h-screen w-full flex flex-col overflow-hidden">
<!-- Background Layer -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-[#0a0a05]"></div>
<div class="absolute inset-0 halftone-bg"></div>
<!-- Hand-drawn Spray Star -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/20 blur-3xl rounded-full"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] starburst bg-primary spray-drip opacity-80 rotate-12"></div>
<!-- Kirby Krackle Dots -->
<div class="absolute inset-0 opacity-40 pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-32 h-32 rounded-full border-4 border-black border-dashed"></div>
<div class="absolute bottom-1/4 right-1/4 w-48 h-48 rounded-full border-8 border-primary/30 border-dotted"></div>
</div>
</div>
<!-- Content Overlay -->
<div class="relative z-10 flex flex-col h-full min-h-screen">
<!-- Top Nav Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-white/10 px-10 py-4 bg-black/40 backdrop-blur-md">
<div class="flex items-center gap-4 text-white">
<div class="size-6 text-primary">
<span class="material-symbols-outlined text-3xl">grid_view</span>
</div>
<h2 class="text-white text-xl font-bold leading-tight tracking-tight uppercase italic">Spider-Verse Companion</h2>
</div>
<div class="flex gap-3">
<button class="flex size-10 cursor-pointer items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 text-white transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="flex size-10 cursor-pointer items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 text-white transition-colors">
<span class="material-symbols-outlined">person</span>
</button>
</div>
</header>
<!-- Main Splash Content -->
<main class="flex-1 flex flex-col items-center justify-center p-4">
<!-- Victory Headline -->
<div class="relative mb-12 transform -rotate-2">
<h1 class="font-marker text-[120px] md:text-[180px] leading-none text-white chromatic-glitch tracking-tighter filter drop-shadow-[10px_10px_0px_rgba(0,0,0,1)]">
                        VICTORY
                    </h1>
<!-- Glitch Segments -->
<div class="absolute top-0 left-0 w-full h-full font-marker text-[120px] md:text-[180px] leading-none text-spider-pink opacity-30 translate-x-1 -translate-y-1 pointer-events-none">VICTORY</div>
</div>
<!-- Cubes Earned Thought Bubble -->
<div class="relative mb-16 transform rotate-3">
<div class="bg-primary text-black px-8 py-4 rounded-full thought-bubble-sketch flex items-center gap-3">
<span class="material-symbols-outlined font-bold text-3xl">token</span>
<p class="text-3xl font-bold tracking-tighter uppercase italic">Cubes Earned: +8</p>
</div>
<!-- Sketch Decor -->
<div class="absolute -bottom-6 -left-4 w-6 h-6 bg-primary rounded-full border-2 border-black"></div>
<div class="absolute -bottom-10 -left-8 w-4 h-4 bg-primary rounded-full border-2 border-black"></div>
</div>
<!-- Match Recap Card Hidden/Subtle -->
<div class="w-full max-w-2xl bg-black/60 border-2 border-white/20 rounded-xl p-6 backdrop-blur-sm mb-12">
<div class="flex items-center justify-between border-b border-white/10 pb-4 mb-4">
<div class="flex flex-col">
<span class="text-primary/70 text-xs font-bold uppercase tracking-widest">Opponent</span>
<span class="text-xl font-bold">KINGPIN_FAN_99</span>
</div>
<div class="text-right">
<span class="text-primary/70 text-xs font-bold uppercase tracking-widest">Location</span>
<span class="text-xl font-bold">New York City</span>
</div>
</div>
<div class="grid grid-cols-3 gap-4 text-center">
<div class="bg-white/5 p-3 rounded-lg border border-white/5">
<p class="text-xs opacity-50 uppercase mb-1">Lane 1</p>
<p class="text-2xl font-bold text-primary">24</p>
</div>
<div class="bg-white/5 p-3 rounded-lg border border-white/5">
<p class="text-xs opacity-50 uppercase mb-1">Lane 2</p>
<p class="text-2xl font-bold text-spider-pink">12</p>
</div>
<div class="bg-white/5 p-3 rounded-lg border border-white/5">
<p class="text-xs opacity-50 uppercase mb-1">Lane 3</p>
<p class="text-2xl font-bold text-primary">18</p>
</div>
</div>
</div>
<!-- Button Actions -->
<div class="flex flex-wrap gap-6 justify-center w-full max-w-lg">
<button class="group relative flex-1 min-w-[200px] h-16 bg-primary text-black font-black text-xl tracking-tighter rounded-lg transform -rotate-1 hover:rotate-0 transition-transform active:scale-95 border-b-8 border-black">
<span class="flex items-center justify-center gap-2">
                            NEXT MATCH <span class="material-symbols-outlined">forward</span>
</span>
<div class="absolute -top-1 -right-1 w-4 h-4 bg-spider-pink rounded-full border-2 border-black opacity-0 group-hover:opacity-100"></div>
</button>
<button class="flex-1 min-w-[200px] h-16 bg-white/10 text-white font-black text-xl tracking-tighter rounded-lg transform rotate-2 hover:rotate-0 transition-transform active:scale-95 border-2 border-white/20 hover:bg-white/20 border-b-8 border-black/40">
<span class="flex items-center justify-center gap-2">
                            DECK VIEW <span class="material-symbols-outlined">style</span>
</span>
</button>
</div>
</main>
<!-- Footer Stats Bar -->
<footer class="mt-auto bg-black/80 px-10 py-4 flex justify-between items-center border-t-4 border-primary">
<div class="flex gap-8">
<div class="flex items-center gap-2">
<span class="text-primary text-xs font-bold uppercase tracking-tighter">Season Rank</span>
<span class="text-xl font-bold">84 / 100</span>
</div>
<div class="flex items-center gap-2">
<span class="text-spider-pink text-xs font-bold uppercase tracking-tighter">Win Streak</span>
<span class="text-xl font-bold">3 🔥</span>
</div>
</div>
<div class="flex items-center gap-4">
<img alt="Small character avatar miles morales style" class="w-10 h-10 rounded-full border-2 border-primary" data-alt="Miles Morales inspired avatar profile picture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUap80oSee_9Ys7XBEb4trj7FJKnTCY2_GPI9hEagWmZlkHgxi_4ooKW9IuytKTV-NZTGkS7U9Dz2H7lFLEKn8hcpGGjufbB3f05Nh3zQPRp6gvB34WUHl5TiGcJvAAeTx_hsbTb5O6d8wPEbkOrFe64LhmgLW2hCAAX-R_BOvmcbnsC4Kk8zmz1wrZPwZSYslQgArDpbg7_MwXLS2rY_oaYoV3De9721Y_2FH-wFpu70kOwbcyC5x6VlsvKv62jRDUFkOiYGX7QkX"/>
<div class="text-sm">
<p class="font-bold leading-none">SPIDEY_PLAYER_ONE</p>
<p class="text-xs opacity-50">Spider-Verse Companion v2.4</p>
</div>
</div>
</footer>
</div>
<!-- Foreground Texture Overlay -->
<div class="absolute inset-0 z-50 pointer-events-none opacity-[0.03] mix-blend-overlay bg-[url('https://www.transparenttextures.com/patterns/p6.png')]"></div>
</div>
</body></html>
