  <style>
    /* ============================================
       LAYER 1: BRAND TOKENS (Raw palette values)
       ============================================ */
    :root {
      /* Cosmic Purple Foundation */
      --mcu-blue: #c75fff;
      --mcu-blue-light: #d9a8ff;
      --mcu-blue-glow: rgba(173, 43, 238, 0.4);
      --mcu-red: #ff4444;
      --mcu-red-glow: rgba(255, 68, 68, 0.4);
      --mcu-gold: #ffd700;

      /* Cosmic Accents */
      --cosmic-purple: #ad2bee;
      --cosmic-purple-text: #c75fff;
      --cosmic-cyan: #00f3ff;
      --spider-pink: #ff00ff;
      --spider-cyan: #00ffff;
      --spider-yellow: #fef08a;

      /* Series Colors (unchanged) */
      --series-1: #6B7280;
      --series-2: #22C55E;
      --series-3: #8B5CF6;
      --series-4: #EAB308;
      --series-5: #EF4444;
      --series-6: #F97316;
      --series-7: #EC4899;
      --series-8: #06B6D4;
      --series-9: #84CC16;
      --series-10: #A855F7;
      --spotlight: #F97316;

      /* ============================================
         LAYER 2: SEMANTIC TOKENS
         ============================================ */

      /* Surfaces - Cosmic Purple */
      --ui-surface-base: #120818;
      --ui-surface-1: #1c1022;
      --ui-surface-2: #2b1933;
      --ui-surface-glass: rgba(60, 35, 72, 0.6);
      --ui-surface-glass-solid: rgba(28, 16, 34, 0.92);

      /* Borders */
      --ui-border: rgba(255, 255, 255, 0.08);
      --ui-border-accent: rgba(173, 43, 238, 0.6);

      /* Text */
      --ui-text-primary: #eaeaf0;
      --ui-text-secondary: #a08cb0;
      --ui-text-muted: #6e5c7e;
      --ui-text-accent: var(--cosmic-purple-text);

      /* Legacy text tokens (WCAG AA compliant) */
      --text-muted: #9CA3AF;
      --text-placeholder: #9CA3AF;
      --text-disabled: #D1D5DB;

      /* Accent (maps to cosmic purple) */
      --ui-accent: var(--cosmic-purple-text);
      --ui-accent-glow: var(--mcu-blue-glow);
      --ui-accent-light: var(--mcu-blue-light);

      /* Semantic States */
      --ui-success: #22C55E;
      --ui-warning: #EAB308;
      --ui-danger: var(--mcu-red);
      --ui-info: var(--cosmic-purple-text);

      /* Focus Ring (accessibility - gold passes at 13.95:1) */
      --ui-focus-ring: var(--mcu-gold);
      --ui-focus-ring-glow: rgba(255, 215, 0, 0.4);

      /* Shadows */
      --ui-shadow-soft: 0 4px 12px rgba(0, 0, 0, 0.3);
      --ui-shadow-glow: 0 0 15px rgba(173, 43, 238, 0.15);
      --ui-shadow-strong: 0 8px 24px rgba(0, 0, 0, 0.5);

      /* Cosmic Glow Effects */
      --holo-glow: 0 0 15px rgba(173, 43, 238, 0.4);
      --rank-glow: drop-shadow(0 0 15px rgba(173, 43, 238, 0.6));

      /* Stitch Design Tokens */
      --stitch-muted: #b792c9;
      --stitch-accent: #3c2348;
      --stitch-border: #553267;
      --stitch-green: #0bda76;
      --stitch-card: #2a1a33;

      /* Spider-Verse Highlight (overlays only) */
      --ui-highlight: var(--spider-yellow);
      --ui-highlight-glitch: var(--spider-pink);

      /* ============================================
         LAYER 3: EFFECT TOKENS
         ============================================ */

      /* Glass Effects */
      --glass-blur: blur(12px);
      --glass-blur-mobile: blur(6px);
      --glass-blur-none: blur(0px);

      /* Chromatic Effects */
      --chromatic-offset: 2px;
      --sketch-shadow: 6px 6px 0 #111;

      /* Neon Outer Glow for accessibility */
      --text-glow-accent: 0 0 8px rgba(173, 43, 238, 0.4), 0 0 16px rgba(173, 43, 238, 0.3);

      /* ============================================
         LAYER 4: TYPOGRAPHY TOKENS
         ============================================ */

      --font-ui: 'Spline Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      --font-hero: 'Permanent Marker', cursive;
      --font-comic: 'Bangers', 'Impact', 'Arial Black', sans-serif;
      --font-annotation: 'Caveat', cursive;
    }

    /* ============================================
       PERFORMANCE MODE TOGGLE
       Detect low-power devices and disable heavy effects
       ============================================ */

    html[data-perf="low"] {
      --glass-blur: var(--glass-blur-none);
      --glass-blur-mobile: var(--glass-blur-none);
      --ui-surface-glass: var(--ui-surface-glass-solid);
      --ui-shadow-glow: none;
      --text-glow-accent: none;
    }

    @media (prefers-reduced-motion: reduce) {
      :root {
        --glass-blur: var(--glass-blur-none);
        --ui-shadow-glow: none;
      }
    }

    /* ============================================
       REDUCED MOTION - COMPLETE HANDLING
       Kill ALL animations, not just specific ones
       ============================================ */

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    html[data-motion="reduced"] *,
    html[data-motion="reduced"] *::before,
    html[data-motion="reduced"] *::after {
      animation: none !important;
      transition: none !important;
    }

    * { -webkit-tap-highlight-color: transparent; }

    /* Custom focus ring for all interactive elements */
    :focus-visible {
      outline: 3px solid var(--ui-focus-ring);
      outline-offset: 2px;
    }
    :focus:not(:focus-visible) {
      outline: none;
    }
    button:focus-visible,
    a:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 3px solid var(--ui-focus-ring);
      outline-offset: 2px;
      box-shadow: 0 0 0 6px var(--ui-focus-ring-glow);
    }

    /* Screen reader only utility class */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ============================================
       COSMIC GLOW EFFECTS
       ============================================ */
    .mcu-glow-blue {
      box-shadow: 0 0 15px rgba(173, 43, 238, 0.4), inset 0 0 5px rgba(173, 43, 238, 0.2);
    }

    .mcu-glow-red {
      box-shadow: 0 0 15px var(--mcu-red-glow), inset 0 0 5px var(--mcu-red-glow);
    }

    .mcu-glow-gold {
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.4), inset 0 0 5px rgba(255, 215, 0, 0.2);
    }

    .mcu-text-glow {
      text-shadow: var(--text-glow-accent);
    }

    /* Holographic Card Glow */
    .holo-glow {
      box-shadow: 0 0 15px rgba(173, 43, 238, 0.4);
    }

    /* Rank Glow */
    .rank-glow {
      filter: drop-shadow(0 0 15px rgba(173, 43, 238, 0.6));
    }

    /* Card Slot (empty deck slot) */
    .card-slot {
      background: linear-gradient(135deg, #1a1320, #251830);
      border: 2px dashed rgba(173, 43, 238, 0.3);
      border-radius: 0.75rem;
      aspect-ratio: 3/4;
    }
    @supports not (aspect-ratio: 3/4) {
      .card-slot {
        position: relative;
        padding-bottom: 133.33%;
        height: 0;
      }
    }
    .card-slot.filled {
      border-style: solid;
      border-color: rgba(173, 43, 238, 0.6);
      box-shadow: 0 0 15px rgba(173, 43, 238, 0.4);
    }

    /* Show remove button on touch devices (no hover capability) */
    @media (hover: none) {
      .group .group-hover\:opacity-100 {
        opacity: 1;
      }
    }

    /* Cosmic Gradient (linear variant) */
    .cosmic-gradient {
      background: linear-gradient(135deg, #1c1022 0%, #2d1b4d 50%, #1c1022 100%);
    }

    /* Scrollbar hide utility */
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    /* Material Symbols sizing */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 24px;
      line-height: 1;
    }

    /* Spider-Verse Chromatic Text (Victory/High-Energy only) */
    .glitch-text {
      text-shadow:
        var(--chromatic-offset) 0 var(--spider-pink),
        calc(-1 * var(--chromatic-offset)) 0 var(--spider-cyan);
    }

    /* Spider-Verse Sketch Border (Hover states) */
    .sketch-border {
      border: 3px solid #111;
      box-shadow: var(--sketch-shadow);
    }

    /* Cosmic HUD Grid Background */
    .mcu-hud-grid {
      background-image:
        linear-gradient(rgba(173, 43, 238, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(173, 43, 238, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Cosmic Pulse Animation */
    @keyframes arc-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(173, 43, 238, 0.3); }
      50% { box-shadow: 0 0 30px rgba(173, 43, 238, 0.5), 0 0 40px rgba(173, 43, 238, 0.3); }
    }

    .arc-pulse {
      animation: arc-pulse 2s ease-in-out infinite;
    }

    /* Spider-Verse Glitch Animation (Victory only) */
    @keyframes chromatic-glitch {
      0%, 100% { text-shadow: 2px 0 var(--spider-pink), -2px 0 var(--spider-cyan); }
      25% { text-shadow: -2px 0 var(--spider-pink), 2px 0 var(--spider-cyan); }
      50% { text-shadow: 1px 1px var(--spider-pink), -1px -1px var(--spider-cyan); }
      75% { text-shadow: -1px 1px var(--spider-pink), 1px -1px var(--spider-cyan); }
    }

    .chromatic-glitch {
      animation: chromatic-glitch 0.3s ease-in-out infinite;
    }

    /* Reduced Motion Support for all cosmic effects */
    @media (prefers-reduced-motion: reduce) {
      .arc-pulse,
      .glitch-text,
      .chromatic-glitch {
        animation: none;
        text-shadow: none;
      }
      .holo-glow,
      .rank-glow,
      .card-slot.filled {
        box-shadow: none;
        filter: none;
      }
    }

    body {
      font-family: var(--font-ui);
      background-color: var(--ui-surface-base);
      color: var(--ui-text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    @media (orientation: landscape) {
      .app-container {
        padding-left: max(1rem, env(safe-area-inset-left));
        padding-right: max(1rem, env(safe-area-inset-right));
      }
    }
    /* Safe area support for fixed elements */
    nav.fixed.bottom-0 {
      padding-bottom: env(safe-area-inset-bottom);
    }
    header {
      padding-top: calc(1rem + env(safe-area-inset-top));
    }
    .panel-border { border: 3px solid #1A1A1A; box-shadow: 4px 4px 0px #1A1A1A; }
    .halftone { background-image: radial-gradient(circle, rgba(0,0,0,0.1) 1px, transparent 1px); background-size: 8px 8px; }

    /* Comic Book Border System */
    .comic-panel { border: 3px solid #1A1A1A; box-shadow: 4px 4px 0px #1A1A1A; }
    .comic-panel-accent { border: 3px solid #1A1A1A; box-shadow: 4px 4px 0px var(--cosmic-purple); }
    .comic-panel-win { border: 3px solid #1A1A1A; box-shadow: 4px 4px 0px #22C55E; }
    .comic-panel-loss { border: 3px solid #1A1A1A; box-shadow: 4px 4px 0px #ff4444; }
    .comic-panel-sm { border: 2px solid #1A1A1A; box-shadow: 2px 2px 0px #1A1A1A; }
    .comic-tilt-left { transform: rotate(-0.5deg); }
    .comic-tilt-right { transform: rotate(0.8deg); }
    .comic-btn {
      box-shadow: 3px 3px 0px #1A1A1A;
      border: 2px solid #1A1A1A;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .comic-btn:active {
      transform: translate(3px, 3px) !important;
      box-shadow: 0 0 0 #1A1A1A !important;
    }

    /* Card Frame System */
    .card-frame { border: 2.5px solid #1A1A1A; box-shadow: 3px 3px 0px #1A1A1A; transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .card-frame:active { transform: scale(0.97); box-shadow: 1px 1px 0px #1A1A1A; }
    .card-frame-owned { border-color: currentColor; box-shadow: 3px 3px 0px currentColor, 0 0 12px rgba(173,43,238,0.3); }
    @media (hover: hover) {
      .card-frame:hover { transform: translateY(-4px) rotate(-1deg); box-shadow: 5px 7px 0px #1A1A1A; z-index: 5; }
      .card-frame-owned:hover { box-shadow: 5px 7px 0px currentColor, 0 0 20px rgba(173,43,238,0.5); }
    }

    /* Halftone Cosmic (dark-mode friendly) */
    .halftone-cosmic { position: relative; }
    .halftone-cosmic::before {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(173,43,238,0.06) 1px, transparent 1px);
      background-size: 8px 8px; pointer-events: none; z-index: 0;
    }
    .kirby-krackle { position: relative; }
    .kirby-krackle::before {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(173,43,238,0.08) 30%, transparent 35%),
        radial-gradient(circle, rgba(255,215,0,0.05) 20%, transparent 25%);
      background-size: 20px 20px, 15px 15px;
      background-position: 0 0, 10px 10px;
      pointer-events: none; z-index: 0;
    }

    /* Comic Starburst */
    .starburst {
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }

    /* Thought Bubble */
    .thought-bubble {
      position: relative;
      border: 3px solid #1A1A1A;
      border-radius: 50%;
      box-shadow: 4px 4px 0px #1A1A1A;
    }
    .thought-bubble::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 12px;
      background: inherit;
      border: 2px solid #1A1A1A;
      border-radius: 50%;
    }
    .thought-bubble::before {
      content: '';
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%) translateX(4px);
      width: 7px;
      height: 7px;
      background: inherit;
      border: 2px solid #1A1A1A;
      border-radius: 50%;

    /* Comic Micro-Interactions */
    @keyframes comic-pop { 0% { scale: 0.8; rotate: -2deg; opacity: 0; } 60% { scale: 1.05; rotate: 1deg; } 100% { scale: 1; rotate: 0; opacity: 1; } }
    .comic-pop-enter { animation: comic-pop 0.25s ease-out; }
    @keyframes stat-bump { 50% { scale: 1.15; } }
    .stat-bump { animation: stat-bump 0.3s ease-out; }

    /* Phase 1: Directional Page Transitions */
    @keyframes slide-left-enter { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slide-right-enter { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
    .slide-left { animation: slide-left-enter 0.18s ease-out; }
    .slide-right { animation: slide-right-enter 0.18s ease-out; }

    /* Phase 3: Empty state float animation */
    @keyframes empty-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .empty-float { animation: empty-float 3s ease-in-out infinite; }

    /* Phase 4: Skeleton shimmer */
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .skeleton { background: linear-gradient(90deg, #1c1022 25%, #2b1933 50%, #1c1022 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 0.5rem; }
    .skeleton-card { aspect-ratio: 3/4; }
    .skeleton-stat { height: 4rem; }
    .skeleton-text { height: 1rem; margin-bottom: 0.5rem; }
    .skeleton-text.w-3\/4 { width: 75%; }
    .skeleton-text.w-1\/2 { width: 50%; }

    /* Phase 2: Toast animations */
    @keyframes toast-in { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes toast-out { from { opacity: 1; transform: translateX(-50%) translateY(0); } to { opacity: 0; transform: translateX(-50%) translateY(10px); } }
    .toast-enter { animation: toast-in 0.2s ease-out forwards; }
    .toast-exit { animation: toast-out 0.2s ease-in forwards; }

    /* Phase 5: Card toggle pulse */
    @keyframes card-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    .card-pulse { animation: card-pulse 0.2s ease-out; }

    /* Phase 5: Match expand collapse */
    .match-expand { overflow: hidden; transition: max-height 0.25s ease-out, opacity 0.25s ease-out; }

    @media (prefers-reduced-motion: reduce) {
      .halftone-cosmic::before, .kirby-krackle::before { display: none; }
      .slide-left, .slide-right { animation: none !important; }
      .empty-float { animation: none !important; }
      .skeleton { animation: none !important; }
      .toast-enter, .toast-exit { animation: none !important; }
      .card-pulse { animation: none !important; }
    }

    const { useState, useEffect, useMemo, useCallback, useRef, createContext, useContext } = React;

    // ==================== GESTURE HOOKS ====================
    // Pull-to-refresh hook
    const usePullToRefresh = (onRefresh, { threshold = 80 } = {}) => {
      const [pulling, setPulling] = useState(false);
      const [pullDistance, setPullDistance] = useState(0);
      const [refreshing, setRefreshing] = useState(false);
      const startY = useRef(0);
      const containerRef = useRef(null);

      const handleTouchStart = useCallback((e) => {
        if (containerRef.current && containerRef.current.scrollTop === 0) {
          startY.current = e.touches[0].clientY;
        }
      }, []);

      const handleTouchMove = useCallback((e) => {
        if (startY.current === 0) return;
        const currentY = e.touches[0].clientY;
        const distance = Math.max(0, Math.min(currentY - startY.current, 150));

        if (distance > 0) {
          setPullDistance(distance);
          setPulling(distance > threshold);
        }
      }, [threshold]);

      const handleTouchEnd = useCallback(async () => {
        if (pulling && !refreshing) {
          setRefreshing(true);
          try {
            await onRefresh();
          } finally {
            setRefreshing(false);
          }
        }
        setPullDistance(0);
        setPulling(false);
        startY.current = 0;
      }, [pulling, refreshing, onRefresh]);

      return {
        containerRef,
        pullDistance,
        pulling,
        refreshing,
        handlers: {
          onTouchStart: handleTouchStart,
          onTouchMove: handleTouchMove,
          onTouchEnd: handleTouchEnd
        }
      };
    };

    const useSwipeToDelete = (onDelete) => {

      const [showDelete, setShowDelete] = useState(false);

      const swiping = useRef(false);

      const handleTouchStart = useCallback((e) => {
        startX.current = e.touches[0].clientX;
        swiping.current = true;
      }, []);

      const handleTouchMove = useCallback((e) => {
        if (!swiping.current) return;
        const diff = e.touches[0].clientX - startX.current;
        if (diff < 0 && diff > -100) {
          setTranslateX(diff);
        }
      }, []);

      const handleTouchEnd = useCallback(() => {
        swiping.current = false;
        if (translateX < -50) {
          setTranslateX(-80);
          setShowDelete(true);

          setShowDelete(false);
        }
      }, [translateX]);

      const resetSwipe = useCallback(() => {
        setTranslateX(0);
        setShowDelete(false);
      }, []);

      const handleDelete = useCallback(() => {
        onDelete();
        resetSwipe();
      }, [onDelete, resetSwipe]);

        translateX,
        showDelete,

    // ==================== LOG PARSER ====================
    const LogParser = {
      parsePlayerLog(logContent) {
        const matches = [];
        const lines = logContent.split('\n');

        let currentTimestamp = null;

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];

          // Extract timestamp if present
          const tsMatch = line.match(/^\[(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})\]/);
          if (tsMatch) {
            currentTimestamp = tsMatch[1];
          }

          // Look for game result patterns in the log
          if (line.includes('GameResult') || line.includes('MatchComplete') ||
              line.includes('BattleResult') || line.includes('GameOutcome') ||
              line.includes('"Result"') || line.includes('CubesDelta')) {
            try {
              // Try to find JSON object in the line
              const jsonMatch = line.match(/\{[^{}]*\}/);
              if (jsonMatch) {
                const data = JSON.parse(jsonMatch[0]);

                const result = this.normalizeResult(data.Result || data.GameOutcome || data.Outcome);
                const cubes = parseInt(data.CubesDelta || data.Cubes || data.cubes || 0);

                if (result && cubes !== 0) {
                  matches.push({
                    id: crypto.randomUUID ? crypto.randomUUID() : generateId(),
                    timestamp: currentTimestamp ? new Date(currentTimestamp).toISOString() : new Date().toISOString(),
                    result: result,
                    cubes: Math.abs(cubes),
                    deckId: data.DeckId || data.DeckName || null,
                    opponent: data.OpponentName || null,
                    snapped: this.parseSnapState(data),
                    source: 'log_import',
                    notes: ''
                  });
                }
              }
            } catch (e) {
              // Not valid JSON, continue scanning
            }
          }

          // Alternative pattern: look for win/loss with cube values
          const simpleMatch = line.match(/(WIN|LOSS|VICTORY|DEFEAT|RETREAT)[^\d]*(\d+)\s*cube/i);
          if (simpleMatch && !matches.find(m => m.timestamp === currentTimestamp)) {
            const result = this.normalizeResult(simpleMatch[1]);
            const cubes = parseInt(simpleMatch[2]);
            if (result && cubes > 0) {
              matches.push({
                id: crypto.randomUUID ? crypto.randomUUID() : generateId(),
                timestamp: currentTimestamp ? new Date(currentTimestamp).toISOString() : new Date().toISOString(),
                result: result,
                cubes: cubes,
                deckId: null,
                opponent: null,
                snapped: 'NONE',
                source: 'log_import',
                notes: ''
              });
            }
          }
        }

        const unique = this.deduplicateMatches(matches);

        return {
          matches: unique,
          parseDate: new Date().toISOString(),
          rawLineCount: lines.length,
          matchCount: unique.length
        };
      },

      normalizeResult(result) {
        if (!result) return null;
        const r = String(result).toUpperCase();
        if (r.includes('WIN') || r === 'VICTORY') return 'WIN';
        if (r.includes('LOSS') || r.includes('LOSE') || r === 'DEFEAT') return 'LOSS';
        if (r.includes('RETREAT')) return 'LOSS';
        return null;
      },

      parseSnapState(data) {
        if (data.PlayerSnapped && data.OpponentSnapped) return 'BOTH';
        if (data.PlayerSnapped) return 'PLAYER';
        if (data.OpponentSnapped) return 'OPPONENT';
        return 'NONE';
      },

      deduplicateMatches(matches) {
        const seen = new Set();
        return matches.filter(m => {
          const key = `${m.timestamp}-${m.result}-${m.cubes}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      },

      mergeWithExisting(newMatches, existingMatches) {
        const existingKeys = new Set(
          existingMatches.map(m => `${m.timestamp}-${m.result}-${m.cubes}`)
        );

        const toAdd = newMatches.filter(m => {
          const key = `${m.timestamp}-${m.result}-${m.cubes}`;
          return !existingKeys.has(key);
        });

        return {
          added: toAdd,
          skipped: newMatches.length - toAdd.length,
          merged: [...existingMatches, ...toAdd].sort((a, b) =>
            new Date(b.timestamp) - new Date(a.timestamp)
          )
        };
      }
    };

          // Cosmetic counts
          const avatarInv = ss.AvatarInventory || {};
          const avatarCount = (avatarInv.OwnedAvatars || []).length;

          const titleInv = ss.TitleInventory || {};
          const titleCount = (titleInv.OwnedTitles || []).length;

          const cardBacksList = ss.CardBacks || [];
          const cardBackCount = Array.isArray(cardBacksList) ? cardBacksList.length : 0;

          const albumData = ss.AllAlbumData || {};
          const albumCount = typeof albumData === 'object' ? Object.keys(albumData).filter(k => k !== '$type').length : 0;

          return {
            type: 'collectionEnhanced',
            cards: cardList.sort((a, b) => a.cardDefId.localeCompare(b.cardDefId)),
            cardCount: cardList.length,
            variants: variants,
            variantCount: variants.length,
            godSplits: splits,
            godSplitCount: splits.length,
            totalBoosters: cardList.reduce((sum, c) => sum + c.boosters, 0),

    // ==================== INDEXEDDB HELPER (Phase 5) ====================
    const openSyncDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('SnapSyncDB', 1);

        request.onerror = () => reject(request.error);
        request.onsuccess = () => {
          const db = request.result;
          resolve({
            get: (store, key) => new Promise((res, rej) => {
              const tx = db.transaction(store, 'readonly');
              const req = tx.objectStore(store).get(key);
              req.onsuccess = () => res(req.result);
              req.onerror = () => rej(req.error);
            }),
            put: (store, value, key) => new Promise((res, rej) => {
              const tx = db.transaction(store, 'readwrite');
              const req = tx.objectStore(store).put(value, key);
              req.onsuccess = () => res();
              req.onerror = () => rej(req.error);
            }),
            delete: (store, key) => new Promise((res, rej) => {
              const tx = db.transaction(store, 'readwrite');
              const req = tx.objectStore(store).delete(key);
              req.onsuccess = () => res();
              req.onerror = () => rej(req.error);
            })
          });
        };

        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('settings')) {
            db.createObjectStore('settings');
          }
        };
      });
    };

    // Resolve a game CardDefId to display name using a defIdMap
    // Game files use suffixed IDs like "AngelaOriginal", "DeathV2", "NovaOriginalV2"
    // while card DB has clean IDs like "Angela", "Death", "Nova"
    const resolveCardDefId = (cardId, defIdMap) => {
      // Direct match first
      if (defIdMap.has(cardId)) return defIdMap.get(cardId);
      // Strip common game suffixes and retry
      const stripped = cardId.replace(/Original(V\d+)?$/, '').replace(/V\d+$/, '');
      if (stripped !== cardId && defIdMap.has(stripped)) return defIdMap.get(stripped);
      // Try adding common prefixes/words (e.g., "Bucky" → "BuckyBarnes")
      for (const [defId, name] of defIdMap) {
        if (defId.startsWith(cardId) && defId.length <= cardId.length + 10) return name;
      }
      // Return original as fallback
      return cardId;
    };

    // Auto-import all data without preview (for linked folder sync)
    // Player OS: Stores data for all features
    const autoImportAll = (data) => {

      // Removed: tokenShop and shop localStorage writes (Economy HQ trimmed)

      // Missions (Mission Tracker)
      if (data.missions) {
        localStorage.setItem('snap_missions', JSON.stringify({
          ...data.missions,

      // Time Model (Server Time for Countdowns)
      if (data.timeModel) {

          dailyReset: data.timeModel.dailyReset?.toISOString?.() || data.timeModel.dailyReset,

          seasonReset: data.timeModel.seasonReset?.toISOString?.() || data.timeModel.seasonReset,

      }

      // Rank
      if (data.rank) {
        localStorage.setItem('snap_rank', JSON.stringify({
          ...data.rank,

        }));

      }

      // Saved Decks — store to snap_decks (same key DeckBuilder reads)
      if (data.decks && data.decks.decks?.length > 0) {
        // Build CardDefId→displayName map — use CardDataLoader.cache (populated by parseCollection)
        // instead of uniqueCards which may not be updated yet due to async race
        const cardDb = CardDataLoader.cache || uniqueCards || [];
        const defIdMap = new Map();
        cardDb.forEach(card => {
          if (card.defId) defIdMap.set(card.defId, card.name);
          defIdMap.set(card.name, card.name);
        });

        // Convert imported decks to DeckBuilder format
        const importedDecks = data.decks.decks.map(deck => ({
          id: deck.id || crypto.randomUUID(),
          name: deck.name || 'Imported Deck',
          cards: deck.cards.map(cardId => resolveCardDefId(cardId, defIdMap)),
          createdAt: deck.lastUsed || timestamp,
          updatedAt: timestamp,
          imported: true
        }));

        // Merge with existing user-created decks (deduplicate by name)
        const existingDecks = JSON.parse(localStorage.getItem('snap_decks') || '[]');
        const existingNames = new Set(existingDecks.map(d => d.name));
        const newDecks = importedDecks.filter(d => !existingNames.has(d.name));
        const mergedDecks = [...existingDecks, ...newDecks];

        localStorage.setItem('snap_decks', JSON.stringify(mergedDecks));
        results.push(`Decks: ${newDecks.length} imported (${mergedDecks.length} total)`);
      }

      return results;
    };

    // ==================== COLLECTION INFERRER ====================
    const CollectionInferrer = {
      inferFromMatches(matches) {
        const usedCards = new Set();
        for (const match of matches) {
          if (match.deckCards && Array.isArray(match.deckCards)) {
            match.deckCards.forEach(card => usedCards.add(card));
          }
        }
        return Array.from(usedCards);
      },

      mergeWithCollection(inferredCards, existingCollection) {
        const existing = new Set(existingCollection.owned || []);
        let addedCount = 0;

        for (const card of inferredCards) {
          if (!existing.has(card)) {
            existing.add(card);
            addedCount++;
          }
        }

        return {
          owned: Array.from(existing),
          addedCount,
          lastUpdated: new Date().toISOString()
        };
      }
    };

    // ==================== VAULT MANAGER ====================
    const VaultManager = {
      exportFullVault(collection, matches, settings) {
        const totalWins = matches.filter(m => m.result === 'WIN').length;
        const totalGames = matches.length;
        const netCubes = matches.reduce((sum, m) => sum + (m.result === 'WIN' ? m.cubes : -m.cubes), 0);

        return {
          version: '1.0',
          exportDate: new Date().toISOString(),
          collection: collection,
          matches: matches,
          settings: settings,
          stats: {
            totalGames,
            wins: totalWins,
            losses: totalGames - totalWins,
            winRate: totalGames > 0 ? Math.round((totalWins / totalGames) * 100) : 0,
            netCubes
          }
        };
      },

      generateSyncData(collection, matches) {
        const totalWins = matches.filter(m => m.result === 'WIN').length;
        const netCubes = matches.reduce((sum, m) => sum + (m.result === 'WIN' ? m.cubes : -m.cubes), 0);

        return {
          v: 1,
          c: collection.owned || [],
          s: {
            wins: totalWins,
            losses: matches.length - totalWins,
            cubes: netCubes
          }
        };
      },

      compressForQR(syncData) {
        try {
          return LZString.compressToEncodedURIComponent(JSON.stringify(syncData));
        } catch (e) {
          console.error('Compression failed:', e);
          return null;
        }
      },

      decompressFromQR(compressed) {
        try {
          const decompressed = LZString.decompressFromEncodedURIComponent(compressed);
          return JSON.parse(decompressed);
        } catch (e) {
          console.error('Decompression failed:', e);
          return null;
        }
      },

      // Enhanced compression using card indices instead of names (v2 format)
      compressForQRv2(ownedCardNames, stats, cardIndex) {
        try {
          // Convert card names to indices (much smaller than full names)
          const indices = ownedCardNames
            .map(name => cardIndex[name])
            .filter(idx => idx !== undefined)
            .sort((a, b) => a - b);

          // Use delta encoding for sorted indices (even smaller)
          const deltas = indices.map((val, i) => i === 0 ? val : val - indices[i - 1]);

          const payload = {
            v: 2, // Version 2 format
            d: deltas, // Delta-encoded indices
            s: stats ? { w: stats.wins || 0, l: stats.losses || 0, c: stats.cubes || 0 } : null
          };

          return LZString.compressToEncodedURIComponent(JSON.stringify(payload));
        } catch (e) {
          console.error('V2 compression failed:', e);
          return null;
        }
      },

      decompressFromQRv2(compressed, cardList) {
        try {
          const decompressed = LZString.decompressFromEncodedURIComponent(compressed);
          const payload = JSON.parse(decompressed);

          if (payload.v !== 2) {
            // Fallback to v1 format
            return payload;
          }

          // Reconstruct indices from deltas
          const indices = [];
          let currentIndex = 0;
          for (const delta of payload.d) {
            currentIndex += delta;
            indices.push(currentIndex);
          }

          // Convert indices back to card names
          const cardNames = indices
            .map(idx => cardList[idx]?.name)
            .filter(name => name);

          return {
            v: 1, // Convert to v1 format for downstream compatibility
            c: cardNames,
            s: payload.s ? {
              wins: payload.s.w || 0,
              losses: payload.s.l || 0,
              cubes: payload.s.c || 0
            } : null
          };
        } catch (e) {
          console.error('V2 decompression failed:', e);
          return null;
        }
      },

      // Calculate CRC16 checksum for integrity verification
      calculateChecksum(data) {
        let crc = 0xFFFF;
        for (let i = 0; i < data.length; i++) {
          crc ^= data.charCodeAt(i);
          for (let j = 0; j < 8; j++) {
            crc = (crc & 1) ? (crc >> 1) ^ 0xA001 : crc >> 1;
          }
        }
        return crc.toString(16).padStart(4, '0');
      },

      // Create multi-part QR payload with checksums
      createMultiPartPayload(compressed, partNum, totalParts) {
        const checksum = this.calculateChecksum(compressed);
        return {
          p: partNum,
          t: totalParts,
          k: checksum,
          d: compressed
        };
      },

      // Validate and merge multi-part payloads
      mergeMultiPartPayloads(parts) {
        const totalParts = parts[0]?.t;
        if (!totalParts || parts.length !== totalParts) {
          return { error: 'Missing parts', missing: this.findMissingParts(parts, totalParts) };
        }

        // Sort by part number and validate checksums
        const sorted = [...parts].sort((a, b) => a.p - b.p);
        for (const part of sorted) {
          const expectedChecksum = this.calculateChecksum(part.d);
          if (part.k !== expectedChecksum) {
            return { error: 'Checksum mismatch', part: part.p };
          }
        }

        // Merge data
        const merged = sorted.map(p => p.d).join('');
        return { data: merged };
      },

      findMissingParts(parts, totalParts) {
        const present = new Set(parts.map(p => p.p));
        const missing = [];
        for (let i = 1; i <= totalParts; i++) {
          if (!present.has(i)) missing.push(i);
        }
        return missing;
      }
    };

    // ==================== LOG ERROR MESSAGES ====================
    const LogErrors = {
      NO_MATCHES: 'No match data found. Make sure this is the Player.log file from Marvel Snap.',
      PARSE_FAILED: 'Could not parse log file. The game may have updated its format.',
      FILE_TOO_LARGE: 'File is too large (>50MB). Try using a more recent log file.',
      INVALID_FORMAT: 'This doesn\'t appear to be a Marvel Snap log file.',

    // ==================== UTILITY FUNCTIONS ====================
    const getSeriesBorderClass = (series) => `series-border-${series}`;

    const loadFromStorage = (key, defaultValue) => {

    const generateId = () => 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {

    const formatDate = (dateString) => new Date(dateString).toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });

    // Get Tailwind class for series color (supports series 1-10+)

    // ==================== COMPONENTS ====================

    // Offline Indicator

    // Shared Empty State component

    // Phase 1: Directional page transition wrapper

        const diffMin = Math.floor(diffMs / 60000);
        if (diffMin < 1) return 'Just now';
        if (diffMin < 60) return `${diffMin}m ago`;
        const diffHr = Math.floor(diffMin / 60);
        if (diffHr < 24) return `${diffHr}h ago`;
        const diffDays = Math.floor(diffHr / 24);

      };

        if (filter === 'wins') return sorted.filter(m => m.result === 'WIN');

            <span className="text-xs font-medium text-[#ad2bee]">{filteredMatches.length} results</span>
          </div>

          {/* Filter Pills — below the header, scrollable row */}
          <div className="flex gap-2 px-4 pb-3 overflow-x-auto" role="group" aria-label="Filter matches">
            {FILTERS.map(f => (
              <button
                key={f.id}
                onClick={() => setFilter(f.id)}
                className={`stitch-pill shrink-0 ${filter === f.id ? 'active' : ''}`}
                aria-pressed={filter === f.id}
              >
                {f.label}
              </button>
            ))}
          </div>

          {/* Match List */}
          {filteredMatches.length === 0 ? (
            <div className="px-4">
              <EmptyState
                icon="sports_esports"
                title="Your Arena Awaits"
                description="Start logging matches to track your climb"
              />
            </div>
          ) : (
            <div className="flex flex-col gap-1 px-4">
              {filteredMatches.map(match => {
                const isWin = match.result === 'WIN';
                const snap = snapLabel(match.snapped);
                const cubeLabel = `${isWin ? '+' : '-'}${match.cubes} Cube${match.cubes !== 1 ? 's' : ''}`;

                return (
                  <div
                    key={match.id}
                    className="flex gap-4 p-4 rounded-xl items-center cursor-pointer transition-opacity hover:opacity-90 active:opacity-75"
                    style={{
                      background: '#2a1a33',
                      border: '1px solid rgba(255,255,255,0.05)',
                    }}
                    role="button"
                    tabIndex={0}
                    aria-label={`${isWin ? 'Victory' : 'Defeat'} ${cubeLabel}${match.opponent ? ` vs ${match.opponent}` : ''}`}
                    onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') setSelectedMatch(match); }}
                    onClick={() => setSelectedMatch(match)}
                  >
                    {/* Avatar — 64×64 with colored ring indicating result */}
                    <div
                      className="shrink-0 size-16 rounded-lg flex items-center justify-center text-lg font-bold text-white"
                      style={{
                        background: 'rgba(173,43,238,0.25)',
                        outline: `2px solid ${isWin ? 'rgba(11,218,118,0.30)' : 'rgba(239,68,68,0.30)'}`,
                        outlineOffset: '2px',
                      }}
                      aria-hidden="true"
                    >
                      {match.opponent ? avatarInitials(match.opponent) : (isWin ? '✓' : '✗')}
                    </div>

                    {/* Body */}
                    <div className="flex flex-1 flex-col justify-center min-w-0">
                      {/* Result + cube badge row */}
                      <div className="flex items-center gap-2 flex-wrap">
                        <span
                          className={`text-sm font-bold uppercase tracking-tight ${isWin ? 'text-[#0bda76]' : 'text-red-500'}`}
                        >
                          {isWin ? 'Victory' : 'Defeat'}
                        </span>
                        <span
                          className="text-white font-bold text-sm px-2 py-0.5 rounded-full"
                          style={{ background: isWin ? 'rgba(11,218,118,0.20)' : 'rgba(239,68,68,0.20)' }}
                        >
                          {cubeLabel}
                        </span>
                        {snap && (
                          <span
                            className="text-xs px-1.5 py-0.5 rounded-full font-semibold"
                            style={{ background: 'rgba(173,43,238,0.20)', color: '#c75fff' }}
                          >
                            {snap}
                          </span>
                        )}
                      </div>
                      {/* Opponent */}
                      <p className="text-white text-sm font-medium mt-1 truncate">
                        {match.opponent ? `vs. ${match.opponent}` : 'Unknown Opponent'}
                      </p>
                      {/* Deck / notes as suspected archetype line */}
                      {(match.deck || match.notes) && (
                        <p className="text-[#b792c9] text-xs font-normal truncate">
                          {match.deck ? `Deck: ${match.deck}` : match.notes}
                        </p>
                      )}
                    </div>

                    {/* Right meta */}
                    <div className="shrink-0 text-right flex flex-col items-end gap-2">
                      <p className="text-[#b792c9] text-[10px] font-medium uppercase tracking-wide">
                        {relativeTime(match.timestamp)}
                      </p>
                      <span className="material-symbols-outlined text-[#b792c9] text-sm" aria-hidden="true">
                        chevron_right
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* FAB — Analytics, matches Stitch bottom-right placement */}
          <div className="fixed bottom-24 right-6 z-20">
            <button
              className="size-14 rounded-full flex items-center justify-center text-white"
              style={{ background: '#ad2bee', boxShadow: '0 4px 20px rgba(173,43,238,0.40)' }}
              aria-label="View analytics"
            >
              <span className="material-symbols-outlined" aria-hidden="true">analytics</span>
            </button>
          </div>

          {/* Match Turn Analysis overlay — full-screen, slides over History */}
          {selectedMatch && (
            <MatchTurnAnalysis
              match={selectedMatch}
              onBack={() => setSelectedMatch(null)}
            />
          )}
        </div>
      );
    };

    // ==================== MATCH TURN ANALYSIS COMPONENT (Stitch 11) ====================
    // Full-screen overlay shown when a match row in MatchHistory is tapped.
    // Primary reference: 11_match_turn_analysis_b.html
    //
    // TODO — Schema extension needed: real turn-by-turn data requires `match.turns: Turn[]` where
    //   Turn = { turn: number, label: string, status: 'STABLE'|'SNAP'|'RETREAT'|'CLUTCH',
    //            snapEvent?: 'PLAYER'|'OPPONENT'|'BOTH', retreatEvent?: boolean,
    //            playerCards: { name: string, location: 1|2|3 }[],
    //            opponentCards: { name: string, location: 1|2|3 }[],
    //            locationScores: { loc1: [player, opp], loc2: [player, opp], loc3: [player, opp] },
    //            isFinal?: boolean, finalBoard?: { l1: number, l2: number, l3: number, wins: boolean[] } }
    //   Until that is stored, this component generates illustrative placeholder turns from the match summary.
    //
    // TODO — AI Verdict: the "What to learn" section is stubbed. Wire to AIChat with
    //   buildSystemPrompt({ role:'match_analyst' }) + the match context to generate a real verdict.

    const MatchTurnAnalysis = ({ match, onBack }) => {
      const isWin  = match.result === 'WIN';
      const cubes  = match.cubes;

      // ── Relative date ──────────────────────────────────────────────────────
      const formatDate = (iso) => {
        try {
          return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        } catch {
          return 'Unknown date';
        }
      };

      // ── Snap event label (same as MatchHistory) ─────────────────────────────
      const snapLabel = (snapped) => {
        if (snapped === 'PLAYER')   return 'You Snapped';
        if (snapped === 'OPPONENT') return 'Opp Snapped';
        if (snapped === 'BOTH')     return 'Both Snapped';
        return null;
      };

      // ── Illustrative placeholder turns ──────────────────────────────────────
      // These are generated from available match fields so the UI is non-empty.
      // Replace with real match.turns[] when the data model is extended.
      const PLACEHOLDER_CARDS_YOU  = ['Sunspot', 'Iron Man', 'Shang-Chi', 'Sera', 'Collector', 'Sentinel'];
      const PLACEHOLDER_CARDS_OPP  = ['Misty Knight', 'Scorpion', 'Devil Dinosaur', 'Wong', 'Moon Girl', 'White Queen'];
      const KNOWN_DECK_CARDS = match.deck ? [match.deck] : [];

      const placeholderTurns = useMemo(() => {
        const totalTurns = match.snapped !== 'NONE' ? 6 : 5;
        const snapTurn  = match.snapped && match.snapped !== 'NONE' ? 3 : null;

        const turns = [];
        for (let t = 1; t <= totalTurns; t++) {
          const isFinal = t === totalTurns;
          const isSnap  = snapTurn && t === snapTurn;
          const youCard  = PLACEHOLDER_CARDS_YOU[(t - 1) % PLACEHOLDER_CARDS_YOU.length];
          const oppCard  = PLACEHOLDER_CARDS_OPP[(t - 1) % PLACEHOLDER_CARDS_OPP.length];

          // Simulated score ramp based on match result
          const baseScoreYou = t * (isWin ? 4 : 2);
          const baseScoreOpp = t * (isWin ? 2 : 4);

          turns.push({
            turn: t,
            label: isFinal ? (isWin ? 'The Swing' : 'Final Stand') : t === 1 ? 'Opening Move' : t === 2 ? 'Pressure Applied' : `Turn ${t}`,
            status: isSnap ? (match.snapped === 'OPPONENT' ? 'OPP_SNAP' : 'YOU_SNAP') : isFinal ? (isWin ? 'CLUTCH' : 'DEFEAT') : 'STABLE',
            snapEvent: isSnap ? match.snapped : null,
            playerCards: [{ name: KNOWN_DECK_CARDS.length > 0 && t === totalTurns ? KNOWN_DECK_CARDS[0] : youCard, abbr: youCard.slice(0, 3).toUpperCase() }],
            opponentCards: [{ name: oppCard, abbr: oppCard.slice(0, 3).toUpperCase() }],
            isFinalTurn: isFinal,
            scores: {
              loc1: [baseScoreYou,        Math.max(0, baseScoreOpp - 2)],
              loc2: [baseScoreYou - 1,    baseScoreOpp],
              loc3: [Math.max(0, baseScoreYou - 4), baseScoreOpp + 2],
            },
            finalBoard: isFinal ? {
              l1: { you: 24, opp: isWin ? 10 : 28, win: isWin },
              l2: { you: 18, opp: isWin ? 12 : 24, win: isWin },
              l3: { you: 30, opp: isWin ? 40 : 18, win: !isWin },
            } : null,
          });
        }
        return turns;
      }, [match]);

      // ── Status badge helper ─────────────────────────────────────────────────
      const statusBadge = (status, snapEvent) => {
        if (status === 'OPP_SNAP' || (snapEvent === 'OPPONENT')) {
          return { label: 'Opponent Snapped', bg: 'rgba(239,68,68,0.20)', color: '#f87171', border: 'rgba(239,68,68,0.40)' };
        }
        if (status === 'YOU_SNAP' || (snapEvent === 'PLAYER')) {
          return { label: 'You Snapped', bg: 'rgba(173,43,238,0.20)', color: '#c75fff', border: 'rgba(173,43,238,0.40)' };
        }
        if (status === 'CLUTCH') {
          return { label: 'Clutch Win', bg: 'rgba(173,43,238,0.30)', color: '#ad2bee', border: 'rgba(173,43,238,0.50)' };
        }
        if (status === 'DEFEAT') {
          return { label: 'GG', bg: 'rgba(239,68,68,0.10)', color: '#f87171', border: 'rgba(239,68,68,0.20)' };
        }
        return { label: 'Stable', bg: 'rgba(11,218,118,0.15)', color: '#0bda76', border: 'rgba(11,218,118,0.30)' };
      };

      // ── Card color abbreviation (same rainbow as Stitch mockup) ─────────────
      const ABBR_COLORS = ['#4f46e5', '#f97316', '#16a34a', '#ef4444', '#3b82f6', '#8b5cf6'];
      const abbColor = (idx) => ABBR_COLORS[idx % ABBR_COLORS.length];

      // ── Key decision analysis (stubbed — see TODO above) ───────────────────
      const keyDecisions = useMemo(() => {
        const decisions = [];
        if (match.snapped === 'PLAYER' || match.snapped === 'BOTH') {
          decisions.push({
            icon: 'filter_vintage',
            iconColor: '#ad2bee',
            title: 'You Snapped',
            body: `You chose to double the stakes. ${isWin ? 'The snap paid off — you won the cubes.' : 'The snap backfired. Consider retreating sooner when behind on 2+ locations.'}`,
            grade: isWin ? 'GOOD' : 'RISKY',
          });
        }
        if (match.snapped === 'OPPONENT' || match.snapped === 'BOTH') {
          decisions.push({
            icon: 'filter_vintage',
            iconColor: '#ef4444',
            title: 'Opponent Snapped',
            body: `Your opponent doubled the stakes. ${isWin ? 'You correctly called their bluff and stayed in.' : 'You faced a tough spot — retreating for 2 was an option.'}`,
            grade: isWin ? 'GOOD' : 'INFO',
          });
        }
        decisions.push({
          icon: 'flag',
          iconColor: '#fbbf24',
          title: `Turn ${placeholderTurns.length} — Final Play`,
          body: isWin
            ? `Your final placement secured 2 of 3 locations. ${match.deck ? `Playing the ${match.deck} archetype correctly leverages late-game burst power.` : 'Solid endgame execution.'}`
            : `You lost 2 of 3 locations on the final turn. Review whether retreating earlier for 2 cubes was the better line.`,
          grade: isWin ? 'GOOD' : 'REVIEW',
        });
        return decisions;
      }, [match, placeholderTurns, isWin]);

      const gradeStyle = (grade) => {
        if (grade === 'GOOD')   return { color: '#0bda76', bg: 'rgba(11,218,118,0.15)' };
        if (grade === 'RISKY')  return { color: '#fb923c', bg: 'rgba(251,146,60,0.15)' };
        if (grade === 'REVIEW') return { color: '#f87171', bg: 'rgba(239,68,68,0.15)' };
        return { color: '#b792c9', bg: 'rgba(183,146,201,0.10)' };
      };

      return (
        /* Full-screen overlay — sits on top of MatchHistory, same layer as CardDetail */
        <div
          className="fixed inset-0 z-50 overflow-y-auto"
          style={{ background: '#1c1022' }}
          role="dialog"
          aria-modal="true"
          aria-label="Match Turn Analysis"
        >
          {/* ── Top App Bar ─────────────────────────────────────────────────── */}
          <div
            className="sticky top-0 z-10 flex items-center justify-between px-4 py-3"
            style={{
              background: 'rgba(28,16,34,0.92)',
              backdropFilter: 'blur(16px)',
              WebkitBackdropFilter: 'blur(16px)',
              borderBottom: '1px solid rgba(173,43,238,0.15)',
            }}
          >
            {/* Back button */}
            <button
              onClick={onBack}
              className="flex items-center justify-center rounded-full text-[#b792c9] hover:text-white hover:bg-white/10 transition-colors"
              style={{ width: 44, height: 44 }}
              aria-label="Back to Match History"
            >
              <span className="material-symbols-outlined" aria-hidden="true">arrow_back_ios_new</span>
            </button>

            {/* Title */}
            <div className="flex flex-col items-center">
              <h2 className="text-white text-lg font-bold leading-tight tracking-tight">Match Analysis</h2>
              <span className="text-xs font-medium" style={{ color: '#ad2bee' }}>
                {match.opponent ? `vs. ${match.opponent}` : 'Unknown Opponent'} · {formatDate(match.timestamp)}
              </span>
            </div>

            {/* Share placeholder */}
            <button
              className="flex items-center justify-center rounded-full text-[#b792c9] hover:text-white hover:bg-white/10 transition-colors"
              style={{ width: 44, height: 44 }}
              aria-label="Share match"
            >
              <span className="material-symbols-outlined" aria-hidden="true">share</span>
            </button>
          </div>

          {/* ── Score Summary Cards ─────────────────────────────────────────── */}
          <div className="flex flex-wrap gap-3 p-4">
            {/* Result */}
            <div
              className="flex min-w-[110px] flex-1 flex-col gap-1 rounded-xl p-4"
              style={{ background: '#3c2348', border: '1px solid rgba(173,43,238,0.20)' }}
            >
              <p className="text-[10px] font-semibold uppercase tracking-wider" style={{ color: '#ad2bee' }}>Result</p>
              <p className={`text-2xl font-bold ${isWin ? 'text-[#0bda76]' : 'text-red-400'}`}>
                {isWin ? 'Victory' : 'Defeat'}
              </p>
            </div>

            {/* Cubes */}
            <div
              className="flex min-w-[110px] flex-1 flex-col gap-1 rounded-xl p-4"
              style={{ background: '#3c2348', border: '1px solid rgba(173,43,238,0.20)' }}
            >
              <p className="text-[10px] font-semibold uppercase tracking-wider" style={{ color: '#ad2bee' }}>Cubes</p>
              <div className="flex items-center gap-2">
                <p className={`text-2xl font-bold ${isWin ? 'text-[#0bda76]' : 'text-red-400'}`}>
                  {isWin ? '+' : '-'}{cubes}
                </p>
                <span className="material-symbols-outlined text-blue-400 text-base" aria-hidden="true">filter_vintage</span>
              </div>
            </div>

            {/* Snap status */}
            <div
              className="flex min-w-[110px] flex-1 flex-col gap-1 rounded-xl p-4"
              style={{ background: '#3c2348', border: '1px solid rgba(173,43,238,0.20)' }}
            >
              <p className="text-[10px] font-semibold uppercase tracking-wider" style={{ color: '#ad2bee' }}>Snap</p>
              <p className="text-white text-lg font-bold leading-tight">
                {snapLabel(match.snapped) || 'No Snap'}
              </p>
            </div>
          </div>

          {/* ── Winning / Key Play Banner ───────────────────────────────────── */}
          <div className="px-4 pb-2">
            <div
              className="rounded-xl p-4"
              style={{
                background: isWin
                  ? 'linear-gradient(135deg, rgba(173,43,238,0.25) 0%, rgba(60,35,72,0.60) 100%)'
                  : 'linear-gradient(135deg, rgba(239,68,68,0.15) 0%, rgba(60,35,72,0.60) 100%)',
                border: `1px solid ${isWin ? 'rgba(173,43,238,0.35)' : 'rgba(239,68,68,0.25)'}`,
              }}
            >
              <div className="flex items-center gap-2 mb-2">
                <span className="material-symbols-outlined text-yellow-400 text-lg" aria-hidden="true">auto_awesome</span>
                <h3 className="text-white font-bold text-sm">{isWin ? 'Winning Play' : 'Turning Point'}</h3>
              </div>
              <p className="text-sm leading-relaxed" style={{ color: '#d1c4e9' }}>
                {isWin
                  ? `Your final turn sealed 2 of 3 locations${match.deck ? ` using the ${match.deck} gameplan` : ''}. The cube gain of +${cubes} reflects clean execution.`
                  : `You were outpowered this match, losing ${cubes} cubes. Review Turn ${Math.max(1, placeholderTurns.length - 2)} for an earlier retreat line.`}
              </p>
              {/* TODO: Replace with AI-generated key play from match.turns data when available */}
            </div>
          </div>

          {/* ── Turn-by-Turn Breakdown ──────────────────────────────────────── */}
          <div className="flex items-center justify-between px-4 pt-4 pb-2">
            <h3 className="text-white text-lg font-bold leading-tight tracking-tight">Turn-by-Turn</h3>
            <span
              className="text-xs px-2 py-1 rounded-full"
              style={{ background: 'rgba(255,255,255,0.05)', color: '#b792c9' }}
            >
              {placeholderTurns.length} turns
            </span>
          </div>

          <div className="space-y-3 px-4 pb-2">
            {placeholderTurns.map((t) => {
              const badge = statusBadge(t.status, t.snapEvent);
              const isSnapTurn = t.snapEvent !== null;
              const cardBg = t.isFinalTurn ? '#3c2348' : '#2b1933';
              const cardBorder = t.isFinalTurn
                ? '1px solid rgba(173,43,238,0.40)'
                : isSnapTurn
                  ? '1px solid rgba(239,68,68,0.30)'
                  : '1px solid rgba(255,255,255,0.05)';
              const borderLeft = isSnapTurn && !t.isFinalTurn ? '4px solid #ef4444' : undefined;

              return (
                <div
                  key={t.turn}
                  className="flex flex-col gap-3 rounded-xl p-4 relative overflow-hidden"
                  style={{ background: cardBg, border: cardBorder, borderLeft }}
                >
                  {/* Snap pulse icon in corner */}
                  {isSnapTurn && !t.isFinalTurn && (
                    <div className="absolute top-3 right-3">
                      <span
                        className="material-symbols-outlined text-red-400 animate-pulse"
                        style={{ fontSize: 20 }}
                        aria-hidden="true"
                      >filter_vintage</span>
                    </div>
                  )}

                  {/* Turn header row */}
                  <div className="flex justify-between items-start">
                    <div className="flex flex-col gap-0.5">
                      <span className="text-xs font-bold uppercase" style={{ color: '#ad2bee' }}>Turn {t.turn}</span>
                      <p className="text-white font-bold text-sm leading-tight">{t.label}</p>
                    </div>
                    <span
                      className="text-[10px] font-bold uppercase tracking-tight px-2 py-0.5 rounded"
                      style={{ background: badge.bg, color: badge.color, border: `1px solid ${badge.border}` }}
                    >
                      {badge.label}
                    </span>
                  </div>

                  {/* Cards played grid */}
                  {!t.isFinalTurn ? (
                    <div className="grid grid-cols-2 gap-3">
                      {/* Player column */}
                      <div className="flex flex-col gap-1">
                        <p className="text-[10px] uppercase" style={{ color: '#b792c9' }}>You</p>
                        {t.playerCards.map((c, i) => (
                          <div
                            key={c.name}
                            className="flex items-center gap-2 p-2 rounded-lg"
                            style={{ background: 'rgba(255,255,255,0.05)' }}
                          >
                            <div
                              className="shrink-0 flex items-center justify-center text-[9px] font-bold text-white rounded"
                              style={{ width: 32, height: 40, background: abbColor(i) }}
                              aria-hidden="true"
                            >{c.abbr}</div>
                            <span className="text-sm font-medium text-white leading-tight truncate">{c.name}</span>
                          </div>
                        ))}
                      </div>

                      {/* Opponent column */}
                      <div className="flex flex-col gap-1">
                        <p className="text-[10px] uppercase" style={{ color: '#b792c9' }}>Opponent</p>
                        {t.opponentCards.map((c, i) => (
                          <div
                            key={c.name}
                            className="flex items-center gap-2 p-2 rounded-lg"
                            style={{ background: 'rgba(255,255,255,0.05)' }}
                          >
                            <div
                              className="shrink-0 flex items-center justify-center text-[9px] font-bold text-white rounded"
                              style={{ width: 32, height: 40, background: '#4b5563' }}
                              aria-hidden="true"
                            >{c.abbr}</div>
                            <span className="text-sm font-medium text-white leading-tight truncate">{c.name}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  ) : (
                    /* Final turn — show all your moves + opponent side by side */
                    <div className="flex flex-col gap-2">
                      <p className="text-[10px] uppercase" style={{ color: '#b792c9' }}>Your Final Moves</p>
                      <div className="flex gap-2">
                        {t.playerCards.map((c, i) => (
                          <div
                            key={c.name}
                            className="flex-1 flex items-center gap-2 p-2 rounded-lg"
                            style={{ background: 'rgba(173,43,238,0.20)', border: '1px solid rgba(173,43,238,0.30)' }}
                          >
                            <div
                              className="shrink-0 flex items-center justify-center text-[9px] font-bold text-white rounded"
                              style={{ width: 32, height: 40, background: abbColor(i) }}
                              aria-hidden="true"
                            >{c.abbr}</div>
                            <span className="text-sm font-bold text-white leading-tight truncate">{c.name}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Location score row */}
                  {!t.isFinalTurn ? (
                    <div
                      className="pt-3 mt-1"
                      style={{ borderTop: '1px solid rgba(255,255,255,0.05)' }}
                    >
                      <div className="flex justify-around text-center">
                        {[
                          { key: 'loc1', label: 'Loc 1', scores: t.scores.loc1 },
                          { key: 'loc2', label: 'Loc 2', scores: t.scores.loc2 },
                          { key: 'loc3', label: 'Loc 3', scores: t.scores.loc3 },
                        ].map(({ key, label, scores: [you, opp] }) => {
                          const youWin = you > opp;
                          const tied   = you === opp;
                          return (
                            <div key={key}>
                              <p className="text-[10px]" style={{ color: '#6b7280' }}>{label}</p>
                              <p
                                className="text-sm font-bold"
                                style={{ color: tied ? '#9ca3af' : youWin ? '#0bda76' : '#f87171' }}
                              >
                                {you} : {opp}
                              </p>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ) : t.finalBoard && (
                    /* Final board state — coloured lane boxes */
                    <div
                      className="p-3 rounded-lg mt-1"
                      style={{ background: 'rgba(0,0,0,0.25)' }}
                    >
                      <p className="text-[10px] text-center font-bold uppercase mb-2" style={{ color: '#ad2bee' }}>Final Board State</p>

    };
    // ==================== END MATCH TURN ANALYSIS ====================

    // Card Substitution Utilities
    const findSubstitutes = (cardName, ownedCards, allCards) => {
      // Find the target card
      const targetCard = allCards.find(c => c.name.toLowerCase() === cardName.toLowerCase());
      if (!targetCard || !targetCard.tags || targetCard.tags.length === 0) {
        return [];
      }

      const targetTags = new Set(targetCard.tags);
      const ownedSet = new Set(ownedCards.map(c => c.toLowerCase()));

      // Find owned cards that share tags (excluding the target itself)
      const candidates = allCards
        .filter(c => {
          if (c.name.toLowerCase() === cardName.toLowerCase()) return false;
          if (!ownedSet.has(c.name.toLowerCase())) return false;
          if (!c.tags || c.tags.length === 0) return false;
          return c.tags.some(tag => targetTags.has(tag));
        })
        .map(c => {
          const matchingTags = c.tags.filter(tag => targetTags.has(tag));
          const costDiff = Math.abs(c.cost - targetCard.cost);
          return {
            name: c.name,
            cost: c.cost,
            power: c.power,
            matchingTags,
            matchCount: matchingTags.length,
            costDiff,
            // Score: prioritize tag matches, then similar cost
            score: matchingTags.length * 10 - costDiff
          };
        })
        .sort((a, b) => b.score - a.score)
        .slice(0, 5);

      return candidates.map(c => ({
        name: c.name,
        cost: c.cost,
        power: c.power,
        reason: `Shares ${c.matchingTags.join(', ')} tag${c.matchingTags.length > 1 ? 's' : ''}${c.costDiff === 0 ? ' (same cost)' : ''}`
      }));
    };

    const getSubstitutionContext = (userMessage, collection, allCards) => {
      if (!collection || !collection.owned || !allCards || allCards.length === 0) {
        return '';
      }

      const ownedSet = new Set(collection.owned.map(c => c.toLowerCase()));
      const messageLower = userMessage.toLowerCase();

      // Find card names mentioned in the message that user doesn't own
      const mentionedMissing = allCards
        .filter(c => {
          const nameLower = c.name.toLowerCase();
          return messageLower.includes(nameLower) && !ownedSet.has(nameLower);
        })
        .slice(0, 3); // Limit to 3 cards to avoid huge context

      if (mentionedMissing.length === 0) {
        return '';
      }

      let context = '\n\nSUBSTITUTION SUGGESTIONS (user is missing these cards):';

      for (const card of mentionedMissing) {
        const subs = findSubstitutes(card.name, collection.owned, allCards);
        context += `\n\n${card.name} (${card.cost}-cost, ${card.power} power):`;
        if (subs.length > 0) {
          context += '\nOwned alternatives:';
          for (const sub of subs) {
            context += `\n- ${sub.name} (${sub.cost}/${sub.power}): ${sub.reason}`;
          }
        } else {
          context += '\nNo direct substitutes found in collection.';
        }
      }

      return context;
    };

    // AI Chat Component
    const AIChat = ({ collection, matches, aiConfig, setActiveTab, messages, setMessages }) => {
      const [input, setInput] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [error, setError] = useState(null);
      const messagesEndRef = useRef(null);

      const scrollToBottom = () => {
        if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages]);

      useEffect(() => {
        if (messages.length === 0) {
          setMessages([{
            id: generateId(),
            role: 'assistant',
            content: "Ready to climb the ranks? I'm Snapapoulous, your Marvel Snap tactical advisor. Ask me about deck building, meta matchups, snap decisions, or anything else about the game!"
          }]);
        }
      }, []);

      const isConfigured = () => {
        if (!aiConfig.provider) return false;
        if (aiConfig.provider === 'gemini-oauth') return isGoogleTokenValid();
        if (aiConfig.provider === 'local') return !!aiConfig.localEndpoint;
        return !!(aiConfig.apiKeys && aiConfig.apiKeys[aiConfig.provider]);
      };

      const sendMessage = async (overrideText) => {
        const text = (overrideText !== undefined ? overrideText : input).trim();
        if (!text || isLoading) return;
        if (!isConfigured()) {
          setError('Please configure an AI provider in Settings first.');
          return;
        }

        const userMessage = { id: generateId(), role: 'user', content: text };
        setMessages(prev => [...prev, userMessage]);
        setInput('');
        setIsLoading(true);
        setError(null);

        try {
          const systemPrompt = buildSystemPrompt(collection, matches);
          // Add substitution context if user mentions cards they don't own
          const substitutionContext = getSubstitutionContext(userMessage.content, collection, uniqueCards);
          const enhancedSystemPrompt = systemPrompt + substitutionContext;
          const apiMessages = [
            { role: 'system', content: enhancedSystemPrompt },
            ...messages.filter(m => m.role !== 'assistant' || messages.indexOf(m) > 0).map(m => ({
              role: m.role, content: m.content
            })),
            { role: 'user', content: userMessage.content }
          ];

          let response;
          const model = aiConfig.model || (AIProviders[aiConfig.provider] && AIProviders[aiConfig.provider].defaultModel);

          switch (aiConfig.provider) {
            case 'gemini-oauth':
              // Pass full messages - callGeminiOAuth handles system instruction extraction
              response = await callGeminiOAuth(apiMessages, model);
              break;
            case 'gemini':
              // Pass full messages - callGeminiAPIKey handles system instruction extraction
              response = await callGeminiAPIKey(apiMessages, model, aiConfig.apiKeys && aiConfig.apiKeys.gemini);
              break;
            case 'groq':
              response = await callGroq(apiMessages, model, aiConfig.apiKeys && aiConfig.apiKeys.groq);
              break;
            case 'claude':
              response = await callClaude(apiMessages, model, aiConfig.apiKeys && aiConfig.apiKeys.claude);
              break;
            case 'openai':
              response = await callOpenAI(apiMessages, model, aiConfig.apiKeys && aiConfig.apiKeys.openai);
              break;
            case 'local':
              response = await callLocal(apiMessages, model, aiConfig.localEndpoint);
              break;
            default:
              throw new Error('Unknown provider');
          }

          setMessages(prev => [...prev, {
            id: generateId(),
            role: 'assistant',
            content: response
          }]);
        } catch (err) {
          setError(err.message || 'Failed to get response');
          console.error('AI error:', err);
        } finally {
          setIsLoading(false);
        }
      };

      const quickPrompts = [
        { label: "What deck today?", prompt: "Based on my collection and current rank, what is the best deck I should play right now to climb?" },
        { label: "OTA impact on my decks", prompt: "How does the latest OTA patch affect my saved decks? Which got stronger or weaker, and what swaps do you recommend?" },
        { label: "Cards to target next", prompt: "Looking at my collection gaps and the current meta, what cards should I prioritize acquiring next to unlock the strongest archetypes?" },
        { label: "Help me beat the meta", prompt: "What is the best way to counter the top meta decks right now? Give me tech card suggestions and play tips based on my collection." },
        { label: "Analyze my win rate", prompt: "Analyze my match history and win rate. What patterns do you see and what should I focus on to improve?" },
        { label: "When should I snap?", prompt: "Explain the key principles of when to snap and when to retreat. Give me a mental framework I can apply every game." }
      ];

      return (
        <div className="flex flex-col h-[calc(100vh-4rem)] pb-16">
          <Header title="SNAPAPOULOUS AI" />

          {!isConfigured() && (
            <div className="mx-4 mb-4 bg-yellow-900/50 border border-yellow-600 rounded-lg p-4">
              <p className="text-yellow-200 text-sm mb-2">AI not configured yet!</p>
              <button onClick={() => setActiveTab('settings')}
                className="bg-mcu-gold text-black px-4 py-2 rounded font-medium hover:bg-yellow-400">
                Configure AI Provider
              </button>
            </div>
          )}

          <div className="flex-1 overflow-y-auto px-4 space-y-4">
            {messages.map(msg => (
              <div key={msg.id} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[85%] p-3 chat-bubble ${
                  msg.role === 'user'
                    ? 'bg-mcu-blue text-white chat-bubble-user'
                    : 'bg-[#1a1320] text-white chat-bubble-ai'
                }`}>
                  <p className="text-sm whitespace-pre-wrap">{msg.content}</p>
                </div>
              </div>
            ))}

            {isLoading && (
              <div className="flex justify-start">
                <div className="bg-[#1a1320] p-4 rounded-lg chat-bubble chat-bubble-ai border border-[rgba(173,43,238,0.35)] shadow-[0_0_24px_rgba(173,43,238,0.35)]">
                  <p className="text-xs text-[#dca3ff] mb-2 font-medium">Snapapoulous is thinking...</p>
                  <div className="flex gap-1">
                    <span className="w-2 h-2 bg-cosmic-purple rounded-full typing-dot"></span>
                    <span className="w-2 h-2 bg-cosmic-purple rounded-full typing-dot"></span>
                    <span className="w-2 h-2 bg-cosmic-purple rounded-full typing-dot"></span>
                  </div>
                </div>
              </div>
            )}

            {error && (
              <div className="bg-red-900/50 border border-red-500 rounded-lg p-3">
                <p className="text-red-300 text-sm">{error}</p>
              </div>
            )}

            <div ref={messagesEndRef} />
          </div>

          {messages.length <= 1 && (
            <div className="px-4 py-2">
              <div className="flex flex-wrap gap-2">
                {quickPrompts.map(qp => (
                  <button key={qp.label} onClick={() => sendMessage(qp.prompt)}
                    className="bg-[#1a1320] text-gray-300 text-xs px-4 py-2 rounded-full hover:bg-stark-surface-2 touch-target-sm">
                    {qp.label}
                  </button>
                ))}
              </div>
            </div>
          )}

          <div className="p-4 bg-gray-900 border-t border-[rgba(173,43,238,0.2)]">
            <div className="flex gap-2">
              <input type="text" value={input} onChange={(e) => setInput(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && sendMessage()}
                placeholder="Ask Snapapoulous..."
                disabled={isLoading}
                className="flex-1 bg-[#120818] text-white rounded-lg px-4 py-3 border-2 border-[rgba(173,43,238,0.2)] focus:border-mcu-blue focus:outline-none focus:ring-2 focus:ring-mcu-blue/20 disabled:opacity-50"
              />
              <button onClick={sendMessage} disabled={isLoading || !input.trim()}
                className="bg-mcu-blue text-white px-6 py-3 rounded-lg font-display font-medium hover:shadow-glow-blue transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed shadow-glass">
                Send
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ==================== CARD DETAIL COMPONENT (Stitch 06) ====================
    // Full-screen overlay shown when any card is tapped in Collection or CardDatabase.
    // Primary reference: 06_card_details_strategy_b.html
    const CardDetail = ({ card, isOwned, onClose, onToggleOwned, editMode = false }) => {
      const artUrl = getCardArtUrl(card);

      // Derive ability keyword badge
      const abilityType = React.useMemo(() => {
        if (!card.ability) return null;
        if (card.ability.startsWith('Ongoing')) return { label: 'Ongoing', cls: 'bg-blue-500/20 text-blue-400' };
        if (card.ability.startsWith('On Reveal')) return { label: 'On Reveal', cls: 'bg-yellow-500/20 text-yellow-400' };
        return null;
      }, [card.ability]);

      // Synergies derived from card data (static heuristic — same-series cards make good partners)
      const synergies = React.useMemo(() => {
        return uniqueCards
          .filter(c => c.name !== card.name && c.series === card.series)
          .slice(0, 4);
      }, [card]);

      // Counters: cards whose ability text references destruction, removal, or power reduction
      const counters = React.useMemo(() => {
        const keywords = ['destroy', 'remove', '-', 'discard', 'reduce'];
        return uniqueCards
          .filter(c => c.name !== card.name && c.ability &&
            keywords.some(kw => c.ability.toLowerCase().includes(kw)))
          .slice(0, 4);
      }, [card]);

      // Strategy tips from ability text (fallback — real tips would come from AI)
      const strategyText = React.useMemo(() => {
        const a = card.ability || '';
        if (a.startsWith('Ongoing')) return `Play ${card.name} early to maximize its Ongoing effect. Protect it with Armor or Cosmo to prevent disruption.`;
        if (a.startsWith('On Reveal')) return `Time ${card.name} carefully — On Reveal fires the moment it's played. Use Ghost to control exactly when it triggers.`;
        if (a.includes('destroy')) return `${card.name} pairs well with Destroy synergies. Carnage and Deathlok can chain with its destruction effect.`;
        if (a.includes('move')) return `${card.name} benefits from movement synergies. Iron Fist and Cloak can reposition it to the most advantageous lane.`;
        return `${card.name} is a solid pick in its archetype. Consider pairing it with cards that amplify ${getSeriesDisplayName(card.series)} strategies.`;
      }, [card]);

      return (
        <div

            />

              onClick={onClose}

              aria-label="Go back"
            >
              <span className="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
