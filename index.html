            <h2 className="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">Card Details</h2>
            <div className="flex w-10 items-center justify-end">
              <div className={`flex items-center justify-center rounded-full size-10 ${isOwned ? 'bg-[#ad2bee]/30 text-[#ad2bee]' : 'bg-white/10 text-white/40'}`}>
                <span className="material-symbols-outlined" style={{ fontVariationSettings: isOwned ? "'FILL' 1" : "'FILL' 0" }}>
                  {isOwned ? 'check_circle' : 'radio_button_unchecked'}
                </span>
              </div>
            </div>
          </header>

          <main className="relative z-10 flex flex-col pb-10">
            {/* Hero Card Art */}
            <div className="px-4 py-6">
              <div className="relative w-full aspect-[3/4] max-w-xs mx-auto bg-[#2b1933] rounded-xl overflow-hidden shadow-2xl border-4 border-[#ad2bee]/50">
                {artUrl ? (
                  <div className="absolute inset-0 bg-cover bg-center" style={{ backgroundImage: `url(${artUrl})` }} />
                ) : (
                  <div className="absolute inset-0 flex items-center justify-center text-[#b792c9]">
                    <span className="material-symbols-outlined text-6xl">style</span>
                  </div>
                )}
                {/* Energy badge */}
                <div className="absolute top-4 left-4 size-14 bg-blue-600 rounded-full flex items-center justify-center border-4 border-white shadow-lg">

                  <span className="text-2xl font-black text-white">{card.power}</span>
                </div>

            <section className="px-6 mb-8">
              <div className="flex items-center gap-2 mb-3">

                <div className="grid grid-cols-2 gap-3">
                  {counters.slice(0, 4).map(ctr => {
                    const ctrArt = getCardArtUrl(ctr);
                    return (
                      <div key={ctr.name} className="bg-red-500/10 border border-red-500/20 p-3 rounded-xl flex items-center gap-3">
                        <div className="size-12 bg-[#2b1933] rounded-md shrink-0 overflow-hidden">
                          {ctrArt ? (
                            <div className="w-full h-full bg-cover bg-center" style={{ backgroundImage: `url(${ctrArt})` }} />
                          ) : (
                            <div className="w-full h-full flex items-center justify-center text-[#b792c9]">
                              <span className="material-symbols-outlined text-sm">style</span>
                            </div>
                          )}
                        </div>
                        <div className="flex flex-col min-w-0">
                          <span className="font-bold text-sm text-white truncate">{ctr.name}</span>
                          <span className="text-[10px] text-red-400 uppercase font-black">Counter</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </section>
            )}

            {/* Collection Action */}
            <div className="px-6">
              {isOwned ? (
                <div className="flex flex-col gap-3">
                  <div className="flex items-center justify-center gap-2 text-[#0bda76] py-3">
                    <span className="material-symbols-outlined" style={{ fontSize: '20px', fontVariationSettings: "'FILL' 1" }}>check_circle</span>
                    <span className="font-bold tracking-wide">In Your Collection</span>
                  </div>
                  {editMode && (
                    <button
                      onClick={onToggleOwned}
                      className="w-full py-3 rounded-xl font-bold bg-red-600 hover:bg-red-700 text-white transition-all"
                    >
                      Remove from Collection
                    </button>
                  )}
                </div>
              ) : (
                <button
                  onClick={onToggleOwned}
                  className="w-full py-3 rounded-xl font-bold bg-[#0bda76] hover:opacity-90 text-[#0f0814] transition-all"
                >
                  Add to Collection
                </button>
              )}
            </div>
          </main>
        </div>
      );
    };

    // Collection Component - Player-Centric: Shows YOUR cards, YOUR stats
    const Collection = ({ collection, setCollection, cardDataVersion }) => {
      const [search, setSearch] = useState('');
      const [seriesFilter, setSeriesFilter] = useState('all');
      const [viewMode, setViewMode] = useState('owned'); // 'owned' (default) or 'browse' (add cards)
      const [editMode, setEditMode] = useState(false); // edit mode for removing cards
      const [selectedCard, setSelectedCard] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, action: null });

      const handleClearAll = useCallback(() => {
        setConfirmDialog({
          isOpen: true,
          action: 'clearCollection'
        });
      }, []);

      const confirmClearCollection = useCallback(() => {
        setCollection({ owned: [], lastUpdated: new Date().toISOString() });
        setConfirmDialog({ isOpen: false, action: null });
      }, [setCollection]);

      // Get owned cards with full card data from database
      const ownedCards = useMemo(() => {
        const ownedSet = new Set(collection.owned || []);
        return uniqueCards.filter(card => ownedSet.has(card.name));
      }, [collection.owned, cardDataVersion]);

      // Pool stats aggregated by player-facing pool name
      const poolStats = useMemo(() => {
        const stats = {};
        const ownedSet = new Set(collection.owned || []);

        Object.keys(POOL_GROUPS).forEach(pool => {
          stats[pool] = { owned: 0, total: 0, percent: 0 };
        });

        uniqueCards.forEach(card => {
          const pool = SERIES_TO_POOL[card.series];
          if (pool && stats[pool]) {
            stats[pool].total++;
            if (ownedSet.has(card.name)) {
              stats[pool].owned++;
            }
          }
        });

        Object.keys(stats).forEach(p => {
          stats[p].percent = stats[p].total > 0 ? Math.round((stats[p].owned / stats[p].total) * 100) : 0;
        });

        return stats;
      }, [collection.owned, cardDataVersion]);

      // Filter cards based on view mode and filters
      const filteredCards = useMemo(() => {
        let cards;
        if (viewMode === 'owned') {
          // Show only YOUR cards
          cards = ownedCards;
        } else {
          // Browse mode: show cards you DON'T own (for adding)
          const ownedSet = new Set(collection.owned || []);
          cards = uniqueCards.filter(card => !ownedSet.has(card.name));
        }

        // Apply search filter
        if (search) {
          cards = cards.filter(card => card.name.toLowerCase().includes(search.toLowerCase()));
        }

        // Apply pool filter (maps pool name to internal series numbers)
        if (seriesFilter !== 'all') {
          const poolSeriesNums = POOL_GROUPS[seriesFilter] || [];
          cards = cards.filter(card => poolSeriesNums.includes(card.series));
        }

        return cards;
      }, [viewMode, ownedCards, collection.owned, search, seriesFilter, cardDataVersion]);

      const toggleCard = (cardName) => {
        setCollection(prev => {
          const isOwned = prev.owned.includes(cardName);
          // In browse mode: only add cards. In owned mode: only remove cards.
          if (viewMode === 'browse' && isOwned) return prev;
          if (viewMode === 'owned' && !isOwned) return prev;
          return {
            owned: isOwned ? prev.owned.filter(c => c !== cardName) : [...prev.owned, cardName],
            lastUpdated: new Date().toISOString()
          };
        });
      };

      // Pool dropdown options - deduplicated by player-facing pool name
      const availablePools = useMemo(() => {
        const allPools = Object.keys(POOL_GROUPS);
        if (viewMode === 'browse') {
          // Show pools that have cards in the database
          return allPools.filter(pool => (poolStats[pool]?.total || 0) > 0);
        }
        // In owned mode, only show pools where you own at least 1 card
        return allPools.filter(pool => (poolStats[pool]?.owned || 0) > 0);
      }, [viewMode, poolStats]);

      // Read Collection Level from snap_collection_enhanced (set by file-sync import).
      // TODO: expose collectionScore as a prop from App if live updates are needed;
      //       for now a one-time read on mount is sufficient since import triggers re-render.
      const collectionEnhanced = useMemo(() => {
        try { return JSON.parse(localStorage.getItem('snap_collection_enhanced') || 'null'); } catch { return null; }
      }, [collection.lastUpdated]);

      // Derived stats for Stitch stat cards
      const totalCards = uniqueCards.length;
      const ownedCount = ownedCards.length;
      const completionPct = totalCards > 0 ? Math.round((ownedCount / totalCards) * 100) : 0;
      const collectionLevel = collectionEnhanced?.collectionScore
        ? collectionEnhanced.collectionScore.toLocaleString()
        : ownedCount.toString(); // fallback: owned card count

      // Pool 3 stats for the Stitch progress bar
      const pool3Stats = poolStats['Pool 3'] || { owned: 0, total: 0, percent: 0 };

      return (
        <div className="pb-24">

          {/* ── Stitch: Stats Overview row ── */}
          <div className="flex flex-wrap gap-4 px-4 pt-4 pb-2">
            {/* Collection Level card */}
            <div className="flex min-w-[140px] flex-1 flex-col gap-2 rounded-xl p-5"
                 style={{ background: 'rgba(173,43,238,0.10)', border: '1px solid rgba(173,43,238,0.20)' }}>
              <p className="text-xs uppercase tracking-widest font-bold" style={{ color: '#b792c9' }}>
                {/* TODO: label changes to "Collection Score" once snap_collection_enhanced is populated via file-sync */}
                Collection Level
              </p>
              <p className="text-white text-3xl font-bold leading-tight tracking-tight">{collectionLevel}</p>
            </div>
            {/* Completion % card */}
            <div className="flex min-w-[140px] flex-1 flex-col gap-2 rounded-xl p-5"
                 style={{ background: 'rgba(173,43,238,0.10)', border: '1px solid rgba(173,43,238,0.20)' }}>
              <p className="text-xs uppercase tracking-widest font-bold" style={{ color: '#b792c9' }}>Completion</p>
              <p className="text-white text-3xl font-bold leading-tight tracking-tight">{completionPct}%</p>
            </div>
          </div>

          {/* ── Stitch: Pool 3 Progress bar ── */}
          <div className="flex flex-col gap-3 mx-4 mt-2 mb-4 rounded-xl p-4" style={{ background: '#2a1833' }}>
            <div className="flex gap-6 justify-between">
              <p className="text-white text-sm font-medium leading-normal">Pool 3 Progress</p>
              <p className="text-sm font-bold leading-normal" style={{ color: '#ad2bee' }}>
                {pool3Stats.owned}/{pool3Stats.total}
              </p>
            </div>
            <div className="rounded-full h-2.5 w-full" style={{ background: '#553267' }}>
              <div className="h-2.5 rounded-full" style={{ width: `${pool3Stats.percent}%`, background: '#ad2bee' }} />
            </div>
            {/* TODO: "credits to next Reserve" requires CurrencyState data not currently imported */}
            <p className="text-xs font-normal leading-normal italic" style={{ color: '#b792c9' }}>
              {pool3Stats.percent < 100
                ? `${pool3Stats.total - pool3Stats.owned} cards remaining in Pool 3`
                : 'Pool 3 complete!'}
            </p>
          </div>

          {/* ── Stitch: Search input ── */}
          <div className="px-4 pb-3">
            <label className="flex flex-col w-full h-12">
              <div className="flex w-full flex-1 items-stretch rounded-xl h-full">
                <div className="flex items-center justify-center pl-4 rounded-l-xl border-r-0"
                     style={{ background: '#3c2348', color: '#b792c9' }}>
                  <span className="material-symbols-outlined" style={{ fontSize: '20px' }} aria-hidden="true">search</span>
                </div>
                <input
                  type="text"
                  placeholder={viewMode === 'owned' ? 'Search cards by name or ability' : 'Search cards to add...'}
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  aria-label="Search cards"
                  className="flex w-full flex-1 rounded-xl rounded-l-none border-none focus:outline-none focus:ring-0 text-white text-base font-normal leading-normal pl-2 pr-4"
                  style={{ background: '#3c2348', color: '#ffffff' }}
                />
              </div>
            </label>
          </div>

          {/* ── Stitch: Filter pills row ── */}
          <div className="flex gap-3 px-4 pb-4 overflow-x-auto no-scrollbar">
            {/* View mode: All Cards / Owned / Missing (browse) */}
            <button
              onClick={() => { setViewMode('owned'); setSeriesFilter('all'); setEditMode(false); }}
              className="flex h-9 shrink-0 items-center justify-center gap-x-1 rounded-full px-4 text-sm font-medium"
              style={{ background: viewMode === 'owned' && seriesFilter === 'all' ? '#ad2bee' : '#3c2348', color: '#ffffff' }}
              aria-pressed={viewMode === 'owned' && seriesFilter === 'all'}>
              All Cards
              {viewMode === 'owned' && seriesFilter === 'all' && (
                <span className="material-symbols-outlined" style={{ fontSize: '16px' }}>expand_more</span>
              )}
            </button>
            <button
              onClick={() => { setViewMode('owned'); setSeriesFilter('all'); setEditMode(false); }}
              className="flex h-9 shrink-0 items-center justify-center rounded-full px-4 text-sm font-medium"
              style={{ background: viewMode === 'owned' ? '#ad2bee' : '#3c2348', color: '#ffffff' }}
              aria-pressed={viewMode === 'owned'}>
              Owned ({ownedCount})
            </button>
            <button
              onClick={() => { setViewMode('browse'); setSeriesFilter('all'); setEditMode(false); }}
              className="flex h-9 shrink-0 items-center justify-center rounded-full px-4 text-sm font-medium"
              style={{ background: viewMode === 'browse' ? '#ad2bee' : '#3c2348', color: '#ffffff' }}
              aria-pressed={viewMode === 'browse'}>
              Missing ({totalCards - ownedCount})
            </button>
            {/* Pool filter pills */}
            {availablePools.map(pool => (
              <button key={pool}
                onClick={() => setSeriesFilter(seriesFilter === pool ? 'all' : pool)}
                className="flex h-9 shrink-0 items-center justify-center rounded-full px-4 text-sm font-medium"
                style={{ background: seriesFilter === pool ? '#ad2bee' : '#3c2348', color: '#ffffff' }}
                aria-pressed={seriesFilter === pool}>
                {pool}
              </button>
            ))}
          </div>

          {/* ── Stitch: Section header + Edit Grid toggle ── */}
          <div className="flex items-center justify-between px-4 py-2">
            <h3 className="text-white text-lg font-bold">
              {viewMode === 'owned' ? `My Cards (${filteredCards.length})` : `Add Cards (${filteredCards.length})`}
            </h3>
            {viewMode === 'owned' && (
              <button
                onClick={() => setEditMode(!editMode)}
                className="text-sm font-bold"
                style={{ color: editMode ? '#ffd700' : '#ad2bee' }}>
                {editMode ? 'Done' : 'Edit Grid'}
              </button>
            )}
          </div>

          {/* ── Stitch: Card grid (3-col, Stitch card cell styling) ── */}
          <div className="grid grid-cols-3 gap-3 px-4 pb-4">
            {filteredCards.map(card => {
              const isOwned = collection.owned.includes(card.name);
              const artUrl = getCardArtUrl(card);
              return (
                <div key={card.name}
                     className={`relative group${!isOwned ? ' opacity-50 grayscale' : ''}`}>
                  {/* Card art image — Stitch uses img; fall back to bg-image div when no src */}
                  {artUrl ? (
                    <img
                      src={artUrl}
                      alt={card.name}
                      className={`w-full aspect-[3/4] object-cover rounded-lg border-2 shadow-lg${
                        isOwned ? ' border-[#ad2bee] shadow-[#ad2bee]/20' : ' border-gray-600'
                      }`}
                      loading="lazy"
                    />
                  ) : (
                    <div className={`w-full aspect-[3/4] rounded-lg border-2 card-art card-art-fallback${
                      isOwned ? ' border-[#ad2bee]' : ' border-gray-600'
                    }`}
                         style={{ backgroundImage: `url(${artUrl})` }} />
                  )}

                  {/* Gradient + name overlay */}
                  <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent rounded-lg pointer-events-none" />
                  <div className="absolute bottom-0 left-0 right-0 px-1.5 pb-1.5 z-10 pointer-events-none">
                    <p className="text-center text-[10px] font-bold text-white drop-shadow-lg truncate">{card.name}</p>
                  </div>

                  {/* Owned indicator: green check (in browse mode, confirms already owned) */}
                  {isOwned && viewMode === 'browse' && (
                    <div className="absolute inset-0 bg-black/20 rounded-lg flex items-start justify-end p-1 pointer-events-none">
                      <span className="material-symbols-outlined bg-black/60 rounded-full text-lg" style={{ color: '#0bda76', fontSize: '20px' }}>check_circle</span>
                    </div>
                  )}

                  {/* Missing card: lock overlay */}
                  {!isOwned && viewMode === 'browse' && (
                    <>
                      <div className="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
                        <span className="material-symbols-outlined text-white/50 text-2xl" aria-hidden="true">lock</span>
                      </div>
                      <div className="absolute top-1 right-1 w-6 h-6 rounded-full flex items-center justify-center z-20 pointer-events-none"
                           style={{ background: '#ad2bee' }}>
                        <span className="text-white text-xs font-bold">+</span>
                      </div>
                    </>
                  )}

                  {/* Edit mode: remove badge */}
                  {editMode && viewMode === 'owned' && (
                    <div className="absolute top-1 right-1 w-6 h-6 bg-red-600 rounded-full flex items-center justify-center z-20 animate-pulse pointer-events-none">
                      <span className="text-white text-xs font-bold">✕</span>
                    </div>
                  )}

                  {/* Click target */}
                  <button
                    onClick={() => {
                      if (editMode && viewMode === 'owned') {
                        toggleCard(card.name);
                      } else if (viewMode === 'browse' && !isOwned) {
                        toggleCard(card.name);
                      } else {
                        setSelectedCard(card);
                      }
                    }}
                    className="absolute inset-0 z-10 rounded-lg"
                    aria-label={`${card.name}, ${card.cost} cost, ${card.power} power${isOwned ? ', owned' : ', missing'}${editMode ? ', tap to remove' : ''}`}
                  />
                </div>
              );
            })}
          </div>

          {/* Empty state */}
          {filteredCards.length === 0 && (
            <EmptyState
              icon="collections_bookmark"
              title={
                viewMode === 'owned'
                  ? (collection.owned.length === 0 ? 'Assemble Your Collection' : 'No Matches')
                  : 'All Collected!'
              }
              description={
                viewMode === 'owned'
                  ? (collection.owned.length === 0
                      ? 'Import data or browse cards to start'
                      : 'No cards match your filters')
                  : 'You own them all - impressive!'
              }
            />
          )}

          {/* Card Detail Overlay — Stitch 06 full-screen panel */}
          {selectedCard && (
            <CardDetail
              card={selectedCard}
              isOwned={collection.owned.includes(selectedCard.name)}
              onClose={() => setSelectedCard(null)}
              onToggleOwned={() => { toggleCard(selectedCard.name); setSelectedCard(null); }}
              editMode={editMode}
            />
          )}

          {/* Clear Collection Confirmation Dialog */}
          <ConfirmDialog
            isOpen={confirmDialog.isOpen && confirmDialog.action === 'clearCollection'}
            title="Clear Collection"
            message="Are you sure you want to clear your entire collection? This cannot be undone."
            confirmText="Clear All"
            cancelText="Keep Cards"
            danger={true}
            onConfirm={confirmClearCollection}
            onCancel={() => setConfirmDialog({ isOpen: false, action: null })}
          />
        </div>
      );
    };

    // ==================== CARD DATABASE COMPONENT (Stitch 02) ====================
    // Informational card browser — shows ALL cards (owned or not) with ability text inline.
    // Primary reference: 02_card_database.html
    const CardDatabase = ({ collection, cardDataVersion }) => {
      const [search, setSearch] = useState('');
      const [energyFilter, setEnergyFilter] = useState('all'); // 'all' | 0-6 (6 = 6+)
      const [seriesFilter, setSeriesFilter] = useState('all');
      const [selectedCard, setSelectedCard] = useState(null);

      const allCards = uniqueCards;

      // Series filter chips derived from card data
      const seriesOptions = React.useMemo(() => {
        const seen = new Set();
        const opts = [{ id: 'all', label: 'All Series' }];
        allCards.forEach(c => {
          const disp = getSeriesDisplayName(c.series);
          if (!seen.has(disp)) { seen.add(disp); opts.push({ id: String(c.series), label: disp }); }
        });
        return opts;
      }, [cardDataVersion]);

      const filteredCards = React.useMemo(() => {
        let cards = allCards;

        // Energy filter
        if (energyFilter !== 'all') {
          const e = parseInt(energyFilter, 10);
          if (energyFilter === '6') {
            cards = cards.filter(c => c.cost >= 6);
          } else {
            cards = cards.filter(c => c.cost === e);
          }
        }

        // Series filter
        if (seriesFilter !== 'all') {
          const s = parseInt(seriesFilter, 10);
          cards = cards.filter(c => c.series === s);
        }

        // Text search (name or ability)
        if (search.trim()) {
          const q = search.toLowerCase();
          cards = cards.filter(c =>
            c.name.toLowerCase().includes(q) ||
            (c.ability && c.ability.toLowerCase().includes(q))
          );
        }

        return cards;
      }, [search, energyFilter, seriesFilter, cardDataVersion]);

      const ownedSet = React.useMemo(() => new Set(collection.owned || []), [collection.owned]);

      // Border style based on series (mirrors Stitch rarity tiers)
      const getCardBorderStyle = (card) => {
        if (card.series >= 5) return 'border-[#9d4edd] shadow-[0_0_15px_rgba(157,78,221,0.3)]';
        if (card.series === 4) return 'border-[#ff9a00] shadow-[0_0_15px_rgba(255,154,0,0.3)]';
        if (card.series === 3) return 'border-[#8B5CF6] shadow-[0_0_12px_rgba(139,92,246,0.25)]';
        return 'border-white/20';
      };

      return (
        <div className="flex flex-col min-h-screen pb-20">
          {/* Header */}
          <div className="flex items-center bg-[#1c1022] p-4 pb-2 justify-between sticky top-0 z-20 border-b border-white/10">
            <div className="flex size-10 items-center justify-center rounded-full bg-[#3c2348]">
              <span className="material-symbols-outlined text-[#ad2bee]">search</span>
            </div>
            <h2 className="text-white text-xl font-bold leading-tight tracking-tight flex-1 text-center">Card Database</h2>
            <div className="flex size-10 items-center justify-center">
              <span className="text-[#b792c9] text-xs font-bold">{filteredCards.length}</span>
            </div>
          </div>

          {/* Search bar */}
          <div className="px-4 pt-3 pb-2">
            <label className="flex flex-col">
              <div className="flex w-full flex-1 items-stretch rounded-xl h-11">
                <div className="text-[#b792c9] flex bg-[#3c2348] items-center justify-center pl-4 rounded-l-xl">
                  <span className="material-symbols-outlined text-xl">search</span>
                </div>
                <input
                  type="search"
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                  placeholder="Search by name or ability..."
                  aria-label="Search cards"
                  className="flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-none border-none bg-[#3c2348] h-full placeholder:text-[#b792c9] px-3 rounded-l-none border-l-0 text-sm"
                />
              </div>
            </label>
          </div>

          {/* Filter chips — series */}
          <div className="flex gap-2 px-4 py-2 overflow-x-auto" style={{ scrollbarWidth: 'none' }}>
            {seriesOptions.map(opt => (
              <button
                key={opt.id}
                onClick={() => setSeriesFilter(opt.id)}
                className={`flex h-8 shrink-0 items-center justify-center rounded-full px-4 text-xs font-semibold transition-colors ${
                  seriesFilter === opt.id
                    ? 'bg-[#ad2bee] text-white'
                    : 'bg-[#3c2348] text-[#b792c9] hover:bg-[#553267]'
                }`}
              >
                {opt.label}
              </button>
            ))}
          </div>

          {/* Energy selector */}
          <div className="px-4 py-2">
            <div className="flex h-11 w-full items-center justify-between rounded-full bg-[#3c2348] p-1" role="group" aria-label="Filter by energy cost">
              {['all', '0', '1', '2', '3', '4', '5', '6'].map(e => (
                <button
                  key={e}
                  onClick={() => setEnergyFilter(e)}
                  aria-pressed={energyFilter === e}
                  className={`flex-1 flex h-full items-center justify-center rounded-full text-xs font-bold transition-colors ${
                    energyFilter === e
                      ? 'bg-[#ad2bee] text-white'
                      : 'text-[#b792c9] hover:text-white'
                  }`}
                >
                  {e === 'all' ? 'All' : e === '6' ? '6+' : e}
                </button>
              ))}
            </div>
          </div>

          {/* Card grid */}
          <div className="flex-1 px-4 pb-4">
            {filteredCards.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-16 text-[#b792c9]">
                <span className="material-symbols-outlined text-5xl mb-3">search_off</span>
                <p className="font-bold text-lg mb-1">No cards found</p>
                <p className="text-sm">Try a different search or filter</p>
              </div>
            ) : (
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 py-2">
                {filteredCards.map(card => {
                  const artUrl = getCardArtUrl(card);
                  const owned = ownedSet.has(card.name);
                  const borderCls = getCardBorderStyle(card);
                  return (
                    <button
                      key={card.name}
                      onClick={() => setSelectedCard(card)}
                      className={`group relative aspect-[3/4] rounded-xl overflow-hidden border-2 ${borderCls} transition-transform active:scale-95 text-left`}
                      aria-label={`${card.name}, ${card.cost} energy, ${card.power} power${owned ? ', in collection' : ''}`}
                    >
                      {/* Art */}
                      {artUrl ? (
                        <div className="absolute inset-0 bg-cover bg-center" style={{ backgroundImage: `url(${artUrl})` }} />
                      ) : (
                        <div className="absolute inset-0 bg-[#2b1933] flex items-center justify-center text-[#b792c9]">
                          <span className="material-symbols-outlined text-4xl">style</span>
                        </div>
                      )}
                      {/* Gradient overlay */}
                      <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent" />
                      {/* Energy badge */}
                      <div className="absolute top-2 left-2 flex items-center justify-center h-7 w-7 rounded-full bg-blue-600 border border-white/20 text-[12px] font-bold text-white">
                        {card.cost}
                      </div>
                      {/* Power badge */}
                      <div className="absolute top-2 right-2 flex items-center justify-center h-7 w-7 rounded-full bg-orange-500 border border-white/20 text-[12px] font-bold text-white">
                        {card.power}
                      </div>
                      {/* Owned indicator */}
                      {owned && (
                        <div className="absolute bottom-7 right-2">
                          <span className="material-symbols-outlined text-[#0bda76] text-base bg-black/60 rounded-full" style={{ fontVariationSettings: "'FILL' 1" }}>check_circle</span>
                        </div>
                      )}
                      {/* Name */}
                      <p className="absolute bottom-2 left-2 right-2 text-white text-xs font-bold truncate">{card.name}</p>
                    </button>
                  );
                })}
              </div>
            )}
          </div>

          {/* Card Detail overlay */}
          {selectedCard && (
            <CardDetail
              card={selectedCard}
              isOwned={ownedSet.has(selectedCard.name)}
              onClose={() => setSelectedCard(null)}
              onToggleOwned={() => setSelectedCard(null)}
              editMode={false}
            />
          )}
        </div>
      );
    };

    // ==================== DECKS COMPONENT ====================
    const Decks = ({ decks, setDecks, collection }) => {
      const [view, setView] = useState('list'); // list, create, edit, import
      const [editingDeck, setEditingDeck] = useState(null);
      const [deckName, setDeckName] = useState('');
      const [selectedCards, setSelectedCards] = useState([]);
      const [importCode, setImportCode] = useState('');
      const [importUrl, setImportUrl] = useState('');
      const [importError, setImportError] = useState('');
      const [searchCard, setSearchCard] = useState('');
      const [seriesFilter, setSeriesFilter] = useState('all');
      const [deckToDelete, setDeckToDelete] = useState(null);

      // Case-insensitive set of owned card names for deck ownership checks
      const deckOwnedSet = useMemo(() => new Set((collection.owned || []).map(c => c.toLowerCase())), [collection.owned]);

      // Memoized card lookup map — maps both display names AND defIds for imported deck resolution
      const cardLookup = useMemo(() => {
        const map = new Map();
        uniqueCards.forEach(c => {
          map.set(c.name, c);
          if (c.defId) map.set(c.defId, c);
        });
        return map;
      }, [uniqueCards]);

      // Resolve a deck card name to its canonical display name (handles raw CardDefId from imports)
      const resolveToDisplayName = (cardName) => {
        const card = cardLookup.get(cardName);
        return card ? card.name : cardName;
      };

      const startNewDeck = () => {
        setDeckName('');
        setSelectedCards([]);
        setEditingDeck(null);
        setView('create');
      };

      const editDeck = (deck) => {
        setDeckName(deck.name);
        setSelectedCards([...deck.cards]);
        setEditingDeck(deck.id);
        setView('create');
      };

      const toggleCardInDeck = (cardName) => {
        if (selectedCards.includes(cardName)) {
          setSelectedCards(prev => prev.filter(c => c !== cardName));
        } else if (selectedCards.length < 12) {
          setSelectedCards(prev => [...prev, cardName]);
        }
      };

      const saveDeck = () => {
        if (!deckName.trim() || selectedCards.length !== 12) {
          alert('Please name your deck and select exactly 12 cards.');
          return;
        }
        const newDeck = {
          id: editingDeck || generateId(),
          name: deckName.trim(),
          cards: selectedCards,
          createdAt: editingDeck ? decks.find(d => d.id === editingDeck)?.createdAt : new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };
        if (editingDeck) {
          setDecks(prev => prev.map(d => d.id === editingDeck ? newDeck : d));
        } else {
          setDecks(prev => [...prev, newDeck]);
        }
        setView('list');
        setEditingDeck(null);
      };

      const deleteDeck = useCallback((id) => {
        setDeckToDelete(id);
      }, []);

      const confirmDeleteDeck = useCallback(() => {
        if (deckToDelete) {
          setDecks(prev => prev.filter(d => d.id !== deckToDelete));
          setDeckToDelete(null);
        }
      }, [deckToDelete, setDecks]);

      // Decode deck code (base64 encoded card list)
      // Game uses abbreviated defIds like "Fntmx8" for Fantomex
      // Accepts full deck paste (with # comments) or just the base64 string
      const decodeDeckCode = async (input) => {
        try {
          // Ensure card data is loaded before matching (fallback data doesn't have defId)
          const cardData = await CardDataLoader.load();

          // Extract base64 line from full deck paste (line with 20+ alphanumeric chars, no spaces or #)
          const lines = input.trim().split('\n');
          const base64Line = lines.find(line => /^[A-Za-z0-9+/=]{20,}$/.test(line.trim()));
          const code = base64Line ? base64Line.trim() : input.trim();

          const decoded = atob(code);
          const cardCodes = decoded.split(',').map(s => s.trim()).filter(Boolean);
          if (cardCodes.length !== 12) throw new Error(`Deck must have 12 cards (found ${cardCodes.length})`);

          // Helper to match abbreviated code to card defId
          const matchCard = (abbrev) => {
            // Strip trailing numbers/letters (variant suffixes)
            const base = abbrev.replace(/[0-9A-Z]$/, '').toLowerCase();

            // Try exact defId match first (for simple names like "Blade")
            let match = cardData.find(c => c.defId?.toLowerCase() === abbrev.toLowerCase());
            if (match) return match.name;

            // Try matching by consonant pattern
            // Game abbreviations remove ALL vowels including 'y' (e.g., Lady -> Ld)
            const toConsonants = (s) => s.toLowerCase().replace(/[aeiouy\s\-\'\.]/g, '');
            const abbrConsonants = toConsonants(base);

            // Find best match by comparing consonant patterns
            match = cardData.find(c => {
              const defConsonants = toConsonants(c.defId || c.name);
              return defConsonants.startsWith(abbrConsonants) || abbrConsonants.startsWith(defConsonants);
            });

            if (match) return match.name;

            // Fallback: try partial name match
            match = cardData.find(c =>
              c.name.toLowerCase().replace(/[^a-z]/g, '').startsWith(base.replace(/[^a-z]/g, ''))
            );

            if (match) return match.name;
            throw new Error(`Unknown card code: ${abbrev}`);
          };

          return cardCodes.map(matchCard);
        } catch (e) {
          throw new Error('Invalid deck code: ' + e.message);
        }
      };

      // Import from MarvelSnapZone URL
      const importFromUrl = async () => {
        setImportError('');
        try {
          // Extract deck name and cards from URL
          // URL format: https://marvelsnapzone.com/decks/deck-name/
          const url = importUrl.trim();
          if (!url.includes('marvelsnapzone.com') && !url.includes('untapped.gg')) {
            throw new Error('Please enter a MarvelSnapZone or Untapped.gg deck URL');
          }

          // For demonstration, we'll parse the URL manually
          // In production, you'd fetch the page and parse the card list
          setImportError('URL import coming soon! For now, please use a deck code.');
        } catch (e) {
          setImportError(e.message);
        }
      };

      const importFromCode = async () => {
        setImportError('');
        try {
          const cards = await decodeDeckCode(importCode);
          setSelectedCards(cards);
          setDeckName('Imported Deck');
          setView('create');
        } catch (e) {
          setImportError(e.message);
        }
      };

      // Calculate deck stats (resolves raw CardDefId names from imports)
      const getDeckStats = (cardNames) => {
        const resolvedNames = cardNames.map(resolveToDisplayName);
        const cards = resolvedNames.map(name => cardLookup.get(name)).filter(Boolean);
        const avgCost = cards.length > 0 ? (cards.reduce((sum, c) => sum + c.cost, 0) / cards.length).toFixed(1) : 0;
        const totalPower = cards.reduce((sum, c) => sum + c.power, 0);
        const ownedCount = resolvedNames.filter(name => collection.owned.includes(name)).length;
        const curve = [0, 0, 0, 0, 0, 0, 0]; // 0-6+ cost
        cards.forEach(c => { curve[Math.min(c.cost, 6)]++; });
        return { avgCost, totalPower, ownedCount, curve, cards };
      };

      const filteredCards = useMemo(() => {
        return uniqueCards.filter(c => {
          if (searchCard && !c.name.toLowerCase().includes(searchCard.toLowerCase())) return false;
          if (seriesFilter !== 'all') {
            const poolNums = POOL_GROUPS[seriesFilter] || [];
            if (!poolNums.includes(c.series)) return false;
          }
          return true;
        });
      }, [searchCard, seriesFilter]);

      // List View
      if (view === 'list') {
        return (
          <div className="px-4 pb-20">
            <Header title="MY DECKS" />
            <div className="flex gap-2 mb-4">
              <button onClick={startNewDeck}
                className="flex-1 bg-mcu-red text-white py-3 rounded-lg font-display font-semibold hover:shadow-glow-red transition-all duration-200">
                + Create Deck
              </button>
              <button onClick={() => setView('import')}
                className="flex-1 bg-series-3 text-white py-3 rounded-lg font-display font-semibold hover:shadow-glow-blue transition-all duration-200">
                Import Deck
              </button>
            </div>
            {decks.length === 0 ? (
              <EmptyState
                icon="auto_fix_high"
                title="Build Your Arsenal"
                description="Create your first deck or import one from MarvelSnapZone"
                className="py-12"
              />
            ) : (
              <div className="space-y-3">
                {decks.map(deck => {
                  const stats = getDeckStats(deck.cards);
                  return (
                    <div key={deck.id} className="stitch-card p-5">
                      <div className="flex justify-between items-start mb-2">
                        <h3 className="text-lg font-display font-semibold text-white">{deck.name}</h3>
                        <div className="flex gap-2">
                          <button onClick={() => editDeck(deck)} className="text-mcu-blue hover:text-white text-sm">Edit</button>
                          <button onClick={() => deleteDeck(deck.id)} className="text-red-500 hover:text-red-400 text-sm">Delete</button>
                        </div>
                      </div>
                      <div className="flex gap-4 text-sm text-stitch-muted mb-3">
                        <span>Avg Cost: <span className="text-mcu-blue">{stats.avgCost}</span></span>
                        <span>Total Power: <span className="text-mcu-red">{stats.totalPower}</span></span>
                        <span>Owned: <span className={stats.ownedCount === 12 ? 'text-green-500' : 'text-yellow-500'}>{stats.ownedCount}/12</span></span>
                      </div>
                      {/* Mana Curve */}
                      <div className="flex gap-1 items-end h-8 mb-3">
                        {stats.curve.map((count, cost) => (
                          <div key={cost} className="flex-1 flex flex-col items-center">
                            <div className="bg-mcu-blue w-full rounded-t" style={{ height: count * 8 + 'px' }}></div>
                            <span className="text-xs text-gray-500">{cost}{cost === 6 ? '+' : ''}</span>
                          </div>
                        ))}
                      </div>
                      {/* Card Pills */}
                      <div className="flex flex-wrap gap-1">
                        {deck.cards.map(cardName => {
                          const displayName = resolveToDisplayName(cardName);
                          const card = cardLookup.get(displayName);
                          const owned = deckOwnedSet.has(displayName.toLowerCase());
                          return (
                            <span key={cardName} className={`text-xs px-2 py-1 rounded-full ${owned ? 'bg-[#1c1022] text-white' : 'bg-red-900 text-red-300'}`}>
                              {card?.cost || '?'}/{displayName}
                            </span>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Delete Deck Confirmation Dialog */}
            <ConfirmDialog
              isOpen={!!deckToDelete}
              title="Delete Deck"
              message="Are you sure you want to delete this deck? This cannot be undone."
              confirmText="Delete"
              cancelText="Keep Deck"
              danger={true}
              onConfirm={confirmDeleteDeck}
              onCancel={() => setDeckToDelete(null)}
            />
          </div>
        );
      }

      // Import View
      if (view === 'import') {
        return (
          <div className="px-4 pb-20">
            <Header title="IMPORT DECK" />
            <button onClick={() => setView('list')} className="text-mcu-blue mb-4">&larr; Back to Decks</button>

            <div className="stitch-card p-5 mb-4">
              <h3 className="text-lg font-display font-semibold text-[#c75fff] mb-3">Import from Deck Code</h3>
              <p className="text-stitch-muted text-sm mb-2">Paste the full deck export from the game (includes # comments and code)</p>
              <textarea placeholder="# (1) Iron Man&#10;# (2) Hulk&#10;...&#10;base64code&#10;#"
                value={importCode} onChange={(e) => setImportCode(e.target.value)}
                rows={6}
                className="w-full bg-[#1a1320] text-white rounded px-3 py-2 mb-2 border-2 border-[rgba(173,43,238,0.3)] focus:border-mcu-blue focus:outline-none focus:ring-2 focus:ring-mcu-blue/20 font-mono text-sm" />
              <button onClick={importFromCode}
                className="w-full bg-mcu-blue text-white py-2 rounded-lg hover:shadow-glow-blue transition-all duration-200">
                Import from Code
              </button>
            </div>

            <div className="stitch-card p-5">
              <h3 className="text-lg font-display font-semibold text-[#c75fff] mb-3">Import from URL</h3>
              <p className="text-stitch-muted text-sm mb-2">Paste a MarvelSnapZone or Untapped.gg deck URL</p>
              <input type="text" placeholder="https://marvelsnapzone.com/decks/..."
                value={importUrl} onChange={(e) => setImportUrl(e.target.value)}
                aria-label="Deck URL"
                className="w-full bg-[#1a1320] text-white rounded px-3 py-2 mb-2 border-2 border-[rgba(173,43,238,0.3)] focus:border-mcu-blue focus:outline-none focus:ring-2 focus:ring-mcu-blue/20" />
              <button onClick={importFromUrl}
                className="w-full bg-series-3 text-white py-2 rounded hover:opacity-80">
                Import from URL
              </button>
            </div>

            {importError && (
              <div className="mt-4 bg-red-900 text-red-300 p-3 rounded-lg">{importError}</div>
            )}
          </div>
        );
      }

      // Create/Edit View — Stitch 09_deck_builder layout
      const deckStats = selectedCards.length > 0 ? getDeckStats(selectedCards) : null;

      // Energy distribution curve (costs 1-6, index 0=1 cost ... 5=6+)
      const curveData = deckStats ? deckStats.curve.slice(1) : [0, 0, 0, 0, 0, 0];
      const curveMax = Math.max(...curveData, 1);

      return (
        <div className="flex flex-col min-h-screen" style={{ background: '#1c1022' }}>

          {/* ── Stitch: Top App Bar ── */}
          <div className="flex items-center justify-between px-4 py-3 sticky top-0 z-50"
               style={{ background: 'rgba(28,16,34,0.92)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', borderBottom: '1px solid rgba(85,50,103,0.5)' }}>
            {/* Back / Close */}
            <button onClick={() => setView('list')}
              className="flex size-10 shrink-0 items-center justify-center rounded-full"
              style={{ background: '#3c2348' }}
              aria-label="Back to deck list">
              <span className="material-symbols-outlined" style={{ color: '#ffffff', fontSize: '22px' }} aria-hidden="true">arrow_back</span>
            </button>

            {/* Title + status */}
            <div className="flex flex-col items-center flex-1 px-3">
              {/* Editable deck name inline */}
              <input
                type="text"
                value={deckName}
                onChange={(e) => setDeckName(e.target.value)}
                placeholder="New Deck"
                aria-label="Deck name"
                className="bg-transparent text-white text-lg font-bold leading-tight tracking-tight text-center w-full focus:outline-none focus:ring-0 border-none placeholder-white/40"
                style={{ caretColor: '#ad2bee' }}
              />
              <span className="text-[11px] font-bold uppercase tracking-widest"
                    style={{ color: selectedCards.length === 12 ? '#0bda76' : '#ad2bee' }}>
                {selectedCards.length === 12
                  ? 'Ready to Save'
                  : `Incomplete (${selectedCards.length}/12)`}
              </span>
            </div>

            {/* Save button */}
            <button
              onClick={saveDeck}
              disabled={selectedCards.length !== 12 || !deckName.trim()}
              className="flex size-10 shrink-0 items-center justify-center rounded-full disabled:opacity-40 transition-opacity"
              style={{ background: '#ad2bee' }}
              aria-label="Save deck">
              <span className="material-symbols-outlined" style={{ color: '#ffffff', fontSize: '20px' }} aria-hidden="true">save</span>
            </button>
          </div>

          {/* ── Scrollable body ── */}
          <div className="flex-1 overflow-y-auto pb-40">

            {/* ── Stitch: Deck Grid (4 cols, 12 slots) ── */}
            <div className="p-4 pt-3">
              <div className="grid grid-cols-4 gap-2">
                {Array.from({ length: 12 }).map((_, i) => {
                  const cardName = selectedCards[i];
                  const card = cardName ? cardLookup.get(cardName) || null : null;
                  const artUrl = card ? getCardArtUrl(card) : null;
                  return cardName ? (
                    <button
                      key={cardName}
                      onClick={() => toggleCardInDeck(cardName)}
                      className="relative aspect-[3/4] rounded-lg overflow-hidden cursor-pointer group holo-glow"
                      aria-label={`Remove ${cardName} from deck`}>
                      {/* Card art */}
                      {artUrl ? (
                        <img src={artUrl} alt={cardName}
                          className="absolute inset-0 w-full h-full object-cover rounded-lg" />
                      ) : (
                        <div className="absolute inset-0 card-art card-art-fallback rounded-lg"
                             style={{ backgroundImage: `url(${artUrl})` }} />
                      )}
                      {/* Gradient overlay */}
                      <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent rounded-lg" />
                      {/* Cost badge */}
                      <span className="absolute top-1 left-1 w-5 h-5 rounded-full bg-blue-600 flex items-center justify-center text-[10px] font-bold text-white shadow z-10">
                        {card?.cost ?? '?'}
                      </span>
                      {/* Remove indicator on hover/touch */}
                      <span className="absolute top-1 right-1 w-5 h-5 rounded-full bg-red-500/90 flex items-center justify-center text-[11px] text-white opacity-0 group-hover:opacity-100 transition-opacity z-10"
                            aria-hidden="true">&times;</span>
                      {/* Card name */}
                      <span className="absolute bottom-1 left-0.5 right-0.5 text-[9px] text-white text-center leading-tight truncate font-bold drop-shadow-lg z-10">
                        {cardName}
                      </span>
                    </button>
                  ) : (
                    <div key={`empty-${i}`}
                      className="card-slot flex items-center justify-center opacity-40"
                      aria-label={`Empty slot ${i + 1}`}>
                      <span className="material-symbols-outlined" style={{ color: '#ad2bee', fontSize: '22px' }} aria-hidden="true">add</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* ── Stitch: Stats Bar ── */}
            <div className="mx-4 mb-3 rounded-xl flex items-center justify-between px-4 py-2.5"
                 style={{ background: 'rgba(173,43,238,0.10)', border: '1px solid rgba(173,43,238,0.20)' }}>
              {/* Stats */}
              <div className="flex gap-5">
                <div className="flex flex-col">
                  <span className="stitch-label">Avg Energy</span>
                  <span className="text-sm font-bold text-white">
                    {deckStats ? deckStats.avgCost : '--'}
                  </span>
                </div>
                <div className="flex flex-col">
                  <span className="stitch-label">Total Power</span>
                  <span className="text-sm font-bold text-white">
                    {deckStats ? deckStats.totalPower : '--'}
                  </span>
                </div>
                <div className="flex flex-col">
                  <span className="stitch-label">Cards</span>
                  <span className={`text-sm font-bold ${selectedCards.length === 12 ? 'text-[#0bda76]' : 'text-[#ffd700]'}`}>
                    {selectedCards.length}/12
                  </span>
                </div>
              </div>
              {/* Energy curve mini-chart (costs 1-6+) */}
              <div className="flex gap-0.5 h-8 items-end" aria-label="Energy curve chart" role="img">
                {curveData.map((count, idx) => {
                  const heightPct = Math.round((count / curveMax) * 100);
                  const opacity = count === 0 ? '0.15'
                    : heightPct >= 80 ? '1'
                    : heightPct >= 50 ? '0.80'
                    : heightPct >= 30 ? '0.60'
                    : '0.40';
                  return (
                    <div key={idx} className="flex flex-col items-center gap-0.5">
                      <div
                        className="w-3 rounded-t-sm transition-all duration-300"
                        style={{
                          height: `${Math.max(heightPct, 8)}%`,
                          background: `rgba(173,43,238,${opacity})`,
                          minHeight: '3px',
                        }}
                        title={`Cost ${idx + 1}${idx === 5 ? '+' : ''}: ${count}`}
                      />
                    </div>
                  );
                })}
              </div>
            </div>

            {/* ── Stitch: Search + Filter pills (sticky below top bar) ── */}
            <div className="px-4 pb-3 sticky top-[65px] z-40"
                 style={{ background: 'rgba(28,16,34,0.95)', backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)' }}>
              {/* Search input */}
              <label className="flex flex-col w-full h-10 mb-3">
                <div className="flex w-full flex-1 items-stretch rounded-xl h-full"
                     style={{ background: '#3c2348' }}>
                  <div className="flex items-center justify-center pl-4 rounded-l-xl"
                       style={{ color: '#b792c9' }}>
                    <span className="material-symbols-outlined" style={{ fontSize: '20px' }} aria-hidden="true">search</span>
                  </div>
                  <input
                    type="text"
                    placeholder="Search collection..."
                    value={searchCard}
                    onChange={(e) => setSearchCard(e.target.value)}
                    aria-label="Search cards to add to deck"
                    className="flex w-full flex-1 rounded-xl rounded-l-none border-none focus:outline-none focus:ring-0 text-white text-sm font-normal px-2"
                    style={{ background: 'transparent', caretColor: '#ad2bee' }}
                  />
                </div>
              </label>

              {/* Filter pills */}
              <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                <button
                  onClick={() => setSeriesFilter('all')}
                  className="flex h-8 shrink-0 items-center justify-center rounded-full px-4 text-xs font-bold transition-colors"
                  style={{ background: seriesFilter === 'all' ? '#ad2bee' : '#3c2348', color: '#ffffff' }}
                  aria-pressed={seriesFilter === 'all'}>
                  All
                </button>
                {Object.keys(POOL_GROUPS).map(pool => (
                  <button key={pool}
                    onClick={() => setSeriesFilter(seriesFilter === pool ? 'all' : pool)}
                    className="flex h-8 shrink-0 items-center justify-center rounded-full px-4 text-xs font-medium transition-colors"
                    style={{ background: seriesFilter === pool ? '#ad2bee' : '#3c2348', color: '#ffffff' }}
                    aria-pressed={seriesFilter === pool}>
                    {pool}
                  </button>
                ))}
              </div>
            </div>

            {/* ── Stitch: Card Browser (3-col grid) ── */}
            <div className="grid grid-cols-3 gap-3 px-4 pb-4">
              {filteredCards.map(card => {
                const isSelected = selectedCards.includes(card.name);
                const isOwned = collection.owned.includes(card.name);
                const artUrl = getCardArtUrl(card);
                return (
                  <button
                    key={card.name}
                    onClick={() => toggleCardInDeck(card.name)}
                    disabled={!isSelected && selectedCards.length >= 12}
                    className="flex flex-col gap-1 cursor-pointer disabled:opacity-30 text-left"
                    aria-label={`${card.name}, cost ${card.cost}, power ${card.power}${isSelected ? ', in deck — tap to remove' : isOwned ? ', owned — tap to add' : ', not owned'}`}
                    aria-pressed={isSelected}>
                    {/* Card art */}
                    <div className="relative w-full aspect-[3/4] rounded-lg overflow-hidden"
                         style={{
                           border: isSelected
                             ? '2px solid #ad2bee'
                             : isOwned
                               ? '1px solid rgba(255,255,255,0.15)'
                               : '1px solid rgba(255,255,255,0.06)',
                           boxShadow: isSelected ? '0 0 14px rgba(173,43,238,0.5)' : 'none',
                           opacity: isOwned || isSelected ? 1 : 0.55,
                         }}>
                      {artUrl ? (
                        <img src={artUrl} alt={card.name}
                          className="w-full h-full object-cover"
                          loading="lazy" />
                      ) : (
                        <div className="w-full h-full card-art card-art-fallback"

            <div className="flex gap-3 pointer-events-auto">
              {/* Smart Auto-fill: pick highest-power owned cards to fill remaining slots */}
              <button
                onClick={() => {
                  if (selectedCards.length >= 12) return;
                  const ownedSet = new Set(collection.owned);
                  const remaining = 12 - selectedCards.length;
                  const candidates = uniqueCards
                    .filter(c => ownedSet.has(c.name) && !selectedCards.includes(c.name))
                    .sort((a, b) => b.power - a.power)
                    .slice(0, remaining)
                    .map(c => c.name);
                  setSelectedCards(prev => [...prev, ...candidates]);
                }}
                disabled={selectedCards.length >= 12}
                className="flex-1 h-12 rounded-full flex items-center justify-center gap-2 font-bold text-sm disabled:opacity-40 transition-opacity"

              <button

    // ==================== ORACLE VIEW WRAPPER ====================

    // Phase 5: Toast notification helper
    const ToastContext = createContext(null);
    const useToast = () => useContext(ToastContext);
    const TOAST_VARIANTS = {
      success: { icon: 'check_circle', className: 'border-green-500/60 bg-green-950/85 text-green-200' },
      error: { icon: 'error', className: 'border-red-500/60 bg-red-950/85 text-red-200' },
      info: { icon: 'info', className: 'border-cosmic-purple/60 bg-[#1a1320]/95 text-white' },
      warning: { icon: 'warning', className: 'border-yellow-500/60 bg-yellow-950/85 text-yellow-200' }
    };
    let legacyToastDispatch = null;

    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);

      const dismiss = useCallback((id) => {
        setToasts(prev => prev.filter(t => t.id !== id));
      }, []);

      const toast = useCallback((message, opts = {}) => {
        const { type = 'info', duration = 3500 } = opts;
        const id = generateId();
        setToasts(prev => [...prev, { id, message, type }]);
        if (duration > 0) {
          window.setTimeout(() => dismiss(id), duration);
        }
        return id;
      }, [dismiss]);

      useEffect(() => {
        legacyToastDispatch = toast;
        return () => {
          if (legacyToastDispatch === toast) legacyToastDispatch = null;
        };
      }, [toast]);

      return (
        <ToastContext.Provider value={{ toast, dismiss }}>
          {children}
          <div className="fixed bottom-20 left-0 right-0 z-[60] flex flex-col items-center gap-2 pointer-events-none" aria-live="polite" aria-atomic="true">
            {toasts.map(t => {
              const variant = TOAST_VARIANTS[t.type] || TOAST_VARIANTS.info;
              return (
                <div key={t.id} role="status" className={`toast-enter pointer-events-auto min-w-[240px] max-w-sm px-4 py-3 rounded-lg border shadow-lg flex items-start gap-2 ${variant.className}`}>
                  <span className="material-symbols-outlined text-base leading-none mt-0.5" aria-hidden="true">{variant.icon}</span>
                  <p className="text-sm leading-snug">{t.message}</p>
                  <button
                    onClick={() => dismiss(t.id)}
                    className="ml-auto text-xs opacity-80 hover:opacity-100"
                    aria-label="Dismiss notification"

                    x
                  </button>
                </div>
              );
            })}
          </div>
        </ToastContext.Provider>
      );
    };

    const showToast = (message, type = 'info', duration = 3500) => {
      if (legacyToastDispatch) {
        legacyToastDispatch(message, { type, duration });
        return;
      }

      const existing = document.getElementById('legacy-toast-fallback');
      if (existing) existing.remove();

      const toast = document.createElement('div');
      toast.id = 'legacy-toast-fallback';
      toast.setAttribute('role', 'alert');
      toast.setAttribute('aria-live', 'polite');
      toast.className = 'toast-enter';
      toast.style.position = 'fixed';
      toast.style.top = '16px';
      toast.style.right = '16px';
      toast.style.zIndex = '100';
      toast.style.padding = '10px 14px';
      toast.style.borderRadius = '10px';

      toast.style.color = '#fff';
      toast.style.boxShadow = '0 8px 24px rgba(0,0,0,0.35)';
      toast.textContent = message;
      document.body.appendChild(toast);

      window.setTimeout(() => {
        toast.classList.remove('toast-enter');
        toast.classList.add('toast-exit');

    // Phase 5: Linked Folder Sync Component (Chrome/Edge only)
    const LinkedFolderSync = ({ onSyncComplete }) => {
      const [folderHandle, setFolderHandle] = useState(null);
      const [isLinked, setIsLinked] = useState(false);
      const [lastSync, setLastSync] = useState(null);
      const [syncing, setSyncing] = useState(false);
      const [error, setError] = useState(null);

      // Check if File System Access API is supported
      const isSupported = typeof window !== 'undefined' && 'showDirectoryPicker' in window;

      // On mount, try to restore saved folder handle
      useEffect(() => {
        restoreFolderHandle();
      }, []);

      async function restoreFolderHandle() {
        try {
          const db = await openSyncDB();
          const handle = await db.get('settings', 'folderHandle');
          if (handle) {
            const permission = await handle.queryPermission({ mode: 'read' });
            if (permission === 'granted') {
              setFolderHandle(handle);
              setIsLinked(true);
              const syncTime = await db.get('settings', 'lastSyncTime');
              if (syncTime) setLastSync(new Date(syncTime));
            }
          }
        } catch (err) {
          console.log('No saved folder handle or permission expired');
        }
      }

      async function handleLinkFolder() {
        try {
          setError(null);

          const handle = await window.showDirectoryPicker({
            id: 'snap-nvprod',
            mode: 'read',
            startIn: 'desktop'
          });

          // Verify it looks like the right folder
          const files = [];
          for await (const entry of handle.values()) {
            files.push(entry.name);
          }

          const expectedFiles = ['CollectionState.json', 'ProfileState.json'];
          const hasExpectedFiles = expectedFiles.some(f => files.includes(f));

          if (!hasExpectedFiles) {
            setError("This doesn't look like the nvprod folder. Please select the folder containing CollectionState.json");
            return;
          }

          const db = await openSyncDB();
          await db.put('settings', handle, 'folderHandle');

          setFolderHandle(handle);
          setIsLinked(true);

          await syncFromFolder(handle);
        } catch (err) {
          if (err.name === 'AbortError') return;
          setError(`Failed to link folder: ${err.message}`);
        }
      }

      async function handleUnlink() {
        try {
          const db = await openSyncDB();
          await db.delete('settings', 'folderHandle');
          await db.delete('settings', 'lastSyncTime');

          setFolderHandle(null);
          setIsLinked(false);
          setLastSync(null);
        } catch (err) {
          console.error('Failed to unlink:', err);
        }
      }

      async function syncFromFolder(handle = folderHandle) {
        if (!handle) return;

        setSyncing(true);
        setError(null);

        try {
          const permission = await handle.requestPermission({ mode: 'read' });
          if (permission !== 'granted') {
            setError('Permission denied. Please re-link the folder.');
            setIsLinked(false);
            return;
          }

          // Player OS: Parse all core state files
          const results = {
            collection: null,
            collectionEnhanced: null,  // For Hall of Armor (variants, splits)
            profile: null,
            mastery: null,
            battlePass: null,
            rewards: null,       // Pity counters for Spotlight Oracle
            missions: null,      // Mission tracking
            timeModel: null,     // Server time for accurate countdowns
            rank: null,          // Rank info
            decks: null          // Saved decks
          };

          // Map state files to parser methods
          const fileMap = {
            'CollectionState.json': 'collection',
            'ProfileState.json': 'profile',
            'CharacterMasteryState.json': 'mastery',
            'BattlePassState.json': 'battlePass',
            'SeasonPassState.json': 'battlePass',  // Alternative filename
            'RewardState.json': 'rewards',
            'MissionState.json': 'missions',
            'TimeModelState.json': 'timeModel',
            'RankState.json': 'rank',
            'CompetitiveRankState.json': 'rank'  // Alternative
          };

          // Parse each available file
          for (const [filename, key] of Object.entries(fileMap)) {
            try {
              const fileHandle = await handle.getFileHandle(filename);
              const file = await fileHandle.getFile();
              const content = await file.text();
              const json = JSON.parse(content);

              switch (key) {
                case 'collection':
                  results.collection = await GameDataParser.parseCollection(json);
                  // Also parse enhanced collection for Hall of Armor
                  results.collectionEnhanced = GameDataParser.parseCollectionEnhanced(json);
                  // Decks live inside CollectionState.json, not a separate file
                  if (!results.decks && json?.ServerState?.Decks) {
                    results.decks = GameDataParser.parseDeckState(json);
                  }
                  break;
                case 'profile':
                  results.profile = GameDataParser.parseProfile(json);
                  break;
                case 'mastery':
                  results.mastery = GameDataParser.parseMastery(json);
                  break;
                case 'battlePass':
                  results.battlePass = GameDataParser.parseBattlePass(json);
                  break;
                case 'rewards':
                  results.rewards = GameDataParser.parseRewardState(json);
                  break;
                case 'missions':
                  results.missions = GameDataParser.parseMissionState(json);
                  break;
                case 'timeModel':
                  results.timeModel = GameDataParser.parseTimeModelState(json);
                  break;
                case 'rank':
                  results.rank = GameDataParser.parseRankState(json);
                  break;
              }
            } catch (err) {
              // File may not exist - that's OK, continue with others
              console.log(`Could not read ${filename}:`, err.message);
            }
          }

          const importResults = autoImportAll(results);

          const now = new Date();
          const db = await openSyncDB();
          await db.put('settings', now.toISOString(), 'lastSyncTime');
          setLastSync(now);

          showToast(`Sync complete!\n${importResults.map(r => '✓ ' + r).join('\n')}`);

          if (onSyncComplete) onSyncComplete();
          window.dispatchEvent(new Event('snap-data-updated'));
        } catch (err) {
          setError(`Sync failed: ${err.message}`);
        } finally {
          setSyncing(false);
        }
      }

      if (!isSupported) {
        return (
          <div className="linked-folder-section" style={{ opacity: 0.7 }}>
            <h4>Link Game Folder</h4>
            <div className="not-supported-msg">
              Folder linking requires Chrome or Edge browser.
            </div>
          </div>
        );
      }

      return (
        <div className="linked-folder-section">
          <h4>Link Game Folder</h4>
          <p className="description">
            Link your game data folder once, then sync with one click anytime.
          </p>

          {!isLinked ? (
            <div>
              <button className="link-folder-btn" onClick={handleLinkFolder}>
                Select nvprod Folder
              </button>
              <p style={{ fontSize: '0.75em', color: '#9CA3AF', marginTop: '8px' }}>
                Navigate to:<br />
                <code style={{ background: '#120818', padding: '2px 6px', borderRadius: '4px', color: '#ffd700' }}>
                  %AppData%\LocalLow\Second Dinner\SNAP\Standalone\States\nvprod
                </code>
              </p>
            </div>
          ) : (
            <div className="linked-status">
              <div className="status-row">
                <span className="status-badge linked">Folder Linked</span>
                <button className="unlink-btn" onClick={handleUnlink}>Unlink</button>
              </div>

              <button className="sync-btn" onClick={() => syncFromFolder()} disabled={syncing}>
                {syncing ? 'Syncing...' : 'Sync Now'}
              </button>

              {lastSync && (
                <p className="last-sync">
                  Last synced: {lastSync.toLocaleString()}
                </p>
              )}
            </div>
          )}

          {error && (
            <div style={{ marginTop: '10px', padding: '10px', background: 'rgba(239,68,68,0.2)', borderRadius: '8px', color: '#ef4444', fontSize: '0.85em' }}>
              {error}
            </div>
          )}
        </div>
      );
    };
